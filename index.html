<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math 101 — Mind Map</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600;700&family=IBM+Plex+Mono:wght@500&family=Cormorant+Garamond:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;background:#f5f3ed}

/* ── LAYER STACK ──────────────────────────────────────────── */
/* z0 */ #bgc{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
/* z1 */ #bg-tint{position:fixed;inset:0;z-index:1;pointer-events:none;
            opacity:0;background:transparent;
            transition:background-color 1.1s ease, opacity 1.1s ease}
/* z2 */ #vig{position:fixed;inset:0;z-index:2;pointer-events:none;
            background:radial-gradient(ellipse 80% 80% at 50% 50%,
              transparent 55%, rgba(200,192,170,.18) 100%)}
/* z3 */ #svg{position:fixed;inset:0;width:100%;height:100%;z-index:3}

/* ── MAP TRANSFORM ────────────────────────────────────────── */
#map{transform-origin:0 0;will-change:transform;
     transition:transform 1.1s cubic-bezier(.77,0,.18,1)}
.mg{transition:opacity 0.65s ease}

/* ── TOP OVERLAY (chapter label) ─────────────────────────── */
#ov{position:fixed;bottom:0;left:0;right:0;padding:0 60px 36px;
    pointer-events:none;z-index:10;transition:opacity .5s}
.ov-tag{font-size:11px;letter-spacing:.15em;text-transform:uppercase;
        color:#b8922d;font-weight:600;margin-bottom:5px}
.ov-title{font-family:'Cormorant Garamond',serif;
          font-size:clamp(18px,2.6vw,36px);font-weight:600;
          color:#1c1b28;line-height:1.1}

/* ── TITLE PANEL (slide 0) ───────────────────────────────── */
#tp{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    text-align:center;pointer-events:none;z-index:10;
    opacity:0;transition:opacity .7s;
    background:rgba(245,243,237,.93);border:1px solid rgba(184,146,45,.25);
    border-radius:18px;padding:22px 44px;backdrop-filter:blur(8px);
    white-space:nowrap}
#tp.vis{opacity:1}
.tp-ksu{font-size:10px;letter-spacing:.16em;text-transform:uppercase;
        color:#b8922d;font-weight:600;margin-bottom:8px}
.tp-h{font-family:'Cormorant Garamond',serif;
      font-size:clamp(22px,3.6vw,46px);font-weight:600;
      color:#1c1b28;line-height:1}
.tp-sub{font-size:13px;color:#68657d;margin-top:7px}

/* ── HINT ────────────────────────────────────────────────── */
#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      font-size:12px;color:#a0a0b8;letter-spacing:.06em;
      pointer-events:none;z-index:10;transition:opacity .4s}

/* ── PROGRESS BAR ────────────────────────────────────────── */
#prog{position:fixed;top:0;left:0;height:3px;
      background:linear-gradient(90deg,#b8922d,#d4a84b);
      transition:width .6s ease,background .8s ease;
      z-index:20;border-radius:0 2px 2px 0}

/* ── DOT INDICATORS ──────────────────────────────────────── */
#dots{position:fixed;bottom:24px;right:36px;display:flex;gap:7px;z-index:20}
.dot{width:7px;height:7px;border-radius:50%;background:#c8c5d8;
     cursor:pointer;transition:background .3s,transform .3s}
.dot.act{background:#b8922d;transform:scale(1.45)}

/* ── NAV ARROWS ──────────────────────────────────────────── */
#aL,#aR{position:fixed;top:50%;transform:translateY(-50%);
        width:44px;height:44px;display:flex;align-items:center;
        justify-content:center;background:rgba(255,255,255,.88);
        border:1px solid rgba(0,0,0,.1);border-radius:50%;
        cursor:pointer;z-index:20;color:#58556e;font-size:18px;
        backdrop-filter:blur(6px);user-select:none;
        transition:background .2s,color .2s;
        box-shadow:0 2px 12px rgba(0,0,0,.08)}
#aL:hover,#aR:hover{background:#fff;color:#1c1b28}
#aL{left:16px}
#aR{right:16px}

/* ── SLIDE COUNTER ───────────────────────────────────────── */
#counter{position:fixed;bottom:28px;left:36px;font-size:12px;
         color:#a0a0b8;letter-spacing:.05em;z-index:10;pointer-events:none}

/* ── KSU CORNER LOGO ─────────────────────────────────────── */
#ksu-corner{position:fixed;top:18px;right:18px;height:46px;
            z-index:20;opacity:0.90;pointer-events:none;
            border-radius:5px;box-shadow:0 2px 10px rgba(0,0,0,.12)}

/* ── KSU TITLE LOGO ──────────────────────────────────────── */
.tp-logo{display:block;height:56px;margin:0 auto 18px;
         border-radius:6px;box-shadow:0 3px 16px rgba(0,0,0,.18)}

/* ── INTRO OVERLAY ───────────────────────────────────────── */
#intro{position:fixed;inset:0;z-index:50;
       display:flex;align-items:center;justify-content:center;
       transition:opacity .9s ease}
#intro.out{opacity:0;pointer-events:none}

#intro-card{text-align:center;
  background:rgba(247,245,240,.84);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(184,146,45,.26);border-radius:28px;
  padding:52px 80px;
  box-shadow:0 22px 70px rgba(0,0,0,.15),
             inset 0 0 0 1px rgba(255,255,255,.55);
  animation:cardIn .8s cubic-bezier(.22,1,.36,1) both}
@keyframes cardIn{
  from{transform:translateY(30px) scale(.96);opacity:0}
  to  {transform:translateY(0)    scale(1);  opacity:1}}

#intro-logo{height:96px;border-radius:8px;margin-bottom:28px;
            display:block;margin-left:auto;margin-right:auto;
            box-shadow:0 4px 20px rgba(0,0,0,.2)}
.intro-course{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
              color:#b8922d;font-weight:600;margin-bottom:14px}
.intro-title{font-family:'Cormorant Garamond',serif;
             font-size:clamp(38px,5vw,64px);font-weight:600;
             color:#1c1b28;line-height:1.05;margin-bottom:13px}
.intro-title em{color:#b8922d;font-style:italic}
.intro-sub{font-size:13.5px;color:#68657d;letter-spacing:.03em;margin-bottom:32px}
.intro-hint{font-size:11.5px;color:#a0a0b8;letter-spacing:.08em;
            animation:hintPulse 2.4s ease-in-out infinite}
.intro-hint kbd{display:inline-block;padding:1px 7px;border-radius:4px;
               border:1px solid #c8c5d8;font-family:inherit;font-size:11px;
               background:rgba(255,255,255,.6)}
@keyframes hintPulse{0%,100%{opacity:.5} 50%{opacity:1}}
#intro{cursor:pointer}

/* ── HIDE PRESENTATION UI BEFORE START ───────────────────── */
body.pre-start #svg,
body.pre-start #ov,
body.pre-start #prog,
body.pre-start #aL,
body.pre-start #aR,
body.pre-start #dots,
body.pre-start #counter,
body.pre-start #ksu-corner,
body.pre-start #tp,
body.pre-start #hint{display:none}
</style>
</head>
<body class="pre-start">

<!-- background layers -->
<canvas id="bgc"></canvas>
<div id="bg-tint"></div>
<div id="vig"></div>

<!-- ── INTRO SPLASH ─────────────────────────────────────── -->
<div id="intro" onclick="startMap()">
  <div id="intro-card">
    <img src="ksu_logo.png" id="intro-logo" alt="King Saud University">
    <div class="intro-course">King Saud University</div>
    <div class="intro-title">Math <em>101</em></div>
    <div class="intro-sub">Functions &middot; Limits &middot; Differentiation &middot; Applications</div>
    <div class="intro-hint">Press <kbd>→</kbd> or click anywhere to begin</div>
  </div>
</div>

<!-- KSU corner logo -->
<img id="ksu-corner" src="ksu_logo.png" alt="King Saud University">

<!-- progress + controls -->
<div id="prog"></div>
<div id="aL" onclick="goTo(cur-1)">&#8592;</div>
<div id="aR" onclick="goTo(cur+1)">&#8594;</div>
<div id="dots"></div>
<div id="counter"></div>

<!-- top overlay -->
<div id="ov">
  <div class="ov-tag" id="ov-tag"></div>
  <div class="ov-title" id="ov-title"></div>
</div>

<!-- title panel (slide 0 only) -->
<div id="tp">
  <img src="ksu_logo.png" class="tp-logo" alt="King Saud University">
  <div class="tp-ksu">Math 101</div>
  <div class="tp-h">Mathematics <em style="color:#b8922d">Mind Map</em></div>
  <div class="tp-sub">Functions &middot; Limits &middot; Differentiation &middot; Applications</div>
</div>

<div id="hint">&#8592; &#8594; or Space to navigate</div>

<!-- main SVG -->
<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- medium drop shadow -->
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000016"/>
    </filter>
    <!-- light drop shadow -->
    <filter id="sh2" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0000000d"/>
    </filter>
    <!-- pill glow (fraction pills) -->
    <filter id="sh3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0000000a"/>
    </filter>
  </defs>
  <g id="map"></g>
</svg>

<script>
// ── PALETTE ───────────────────────────────────────────────────
const GOLD='#b8922d', INK='#1c1b28', GRAY='#58556e';
const COL={
  c1:{ s:'#1aaa7e', l:'#e4f8f1', tint:'rgba(26,170,126,0.04)'  },  // teal
  c2:{ s:'#3572d8', l:'#e8f0fc', tint:'rgba(53,114,216,0.04)'  },  // blue
  c3:{ s:'#d4733a', l:'#fdf0e8', tint:'rgba(212,115,58,0.04)'  },  // orange
  c4:{ s:'#6b5ecf', l:'#ece9fb', tint:'rgba(107,94,207,0.04)'  },  // purple
};

// ── LAYOUT ────────────────────────────────────────────────────
// Root center
const RX=1800, RY=1300;
// Chapter Y (top row fans up, bottom row fans down)
const CH_Y_TOP=850,  CH_Y_BOT=1750;
// Section Y
const SEC_Y_TOP=470, SEC_Y_BOT=2130;
// Topic Y
const TOP_Y_TOP=265, TOP_Y_BOT=2335;
// Pill-1 center Y  (moved further from topics for breathing room)
const P1_Y_TOP=118,  P1_Y_BOT=2482;
// Topic x-spread from section center
const T_OFF=146;
// Section x arrays (left side / right side)  — 440px between sections
// Shifted 100px inward from edges so outermost pills sit ~100px from canvas border
const SEC_X_L=[300,740,1180,1620];
const SEC_X_R=[1980,2420,2860,3300];
// Pill dimensions
const PW=106, PHT=22, PHF=44;  // width, text-height, fraction-height

// ── PILL DATA HELPERS ─────────────────────────────────────────
// Plain text
const T=v=>v;
// Single fraction  {n, d, pre, suf}
const F=(n,d,pre='',suf='')=>({n,d,pre,suf});
// Two fractions joined by operator  {n1,d1,op,n2,d2}
const FF=(n1,d1,op,n2,d2)=>({n1,d1,op,n2,d2});

// ── CH1: FUNCTIONS ────────────────────────────────────────────
const CH1={
  id:'c1', label:'Chapter 1', sub:'Functions',
  col:COL.c1, cx:960, cy:CH_Y_TOP, side:'TL',
  secXs:SEC_X_L, secY:SEC_Y_TOP, topY:TOP_Y_TOP,
  p1Y:P1_Y_TOP,
  sections:[
    { id:'s1a', label:'Number Sets',
      topics:[
        { label:'Real Numbers',   p1:'ℝ = ℚ ∪ 𝕀',          p2:'ℕ ⊂ W ⊂ ℤ ⊂ ℚ ⊂ ℝ'      },
        { label:'Rational ℚ',     p1:F('p','q'),              p2:'p,q ∈ ℤ,  q ≠ 0'         },
        { label:'ℤ · W · ℕ',      p1:'… −1, 0, 1, 2 …',     p2:'ℕ ⊂ W ⊂ ℤ'              }
      ]},
    { id:'s1b', label:'Inequalities',
      topics:[
        { label:'Linear',         p1:'ax + b < 0',            p2:'interval solution'         },
        { label:'Rational',       p1:F('p(x)','q(x)','','≥ 0'), p2:'sign chart'             },
        { label:'Quadratic',      p1:'ax²+bx+c ≥ 0',         p2:'Δ = b²−4ac'              }
      ]},
    { id:'s1c', label:'Functions Explorer',
      topics:[
        { label:'Domain & Range', p1:'D(f±g),  D(f·g)',       p2:F('f','g','D(',  ')')      },
        { label:'One-to-One',     p1:'f(x₁) ≠ f(x₂)',        p2:'H. Line Test'             },
        { label:'Composition',    p1:'f∘g(x) = f(g(x))',     p2:'f⁻¹∘f = id'              }
      ]},
    { id:'s1d', label:'Trig Functions',
      topics:[
        { label:'6 Functions',    p1:'sin, cos, tan',          p2:'cot,  sec,  csc'          },
        { label:'Pythagorean',    p1:'sin²x + cos²x = 1',     p2:'tan²x + 1 = sec²x'       },
        { label:'Inverse Trig',   p1:'arcsin,  arccos',        p2:F('π','2','arctan ∈ (−',')') }
      ]}
  ]
};
// ── CH2: LIMITS & CONTINUITY ──────────────────────────────────
const CH2={
  id:'c2', label:'Chapter 2', sub:'Limits & Continuity',
  col:COL.c2, cx:2640, cy:CH_Y_TOP, side:'TR',
  secXs:SEC_X_R, secY:SEC_Y_TOP, topY:TOP_Y_TOP,
  p1Y:P1_Y_TOP,
  sections:[
    { id:'s2a', label:'Limit Laws',
      topics:[
        { label:'Sum / Diff',    p1:'lim[f ± g]',              p2:'lim f ± lim g'           },
        { label:'Product',       p1:'lim[f · g]',              p2:'lim f · lim g'            },
        { label:'Quotient',      p1:F('f(x)','g(x)','lim '),   p2:'g(x) ≠ 0'               }
      ]},
    { id:'s2b', label:'Limits at Infinity',
      topics:[
        { label:'Definition',    p1:'lim(x→∞) f(x)',           p2:'= L  or  ±∞'             },
        { label:'H. Asymptote',  p1:'y = L',                   p2:'lim(x→±∞) f = L'         },
        { label:'V. Asymptote',  p1:'x = a',                   p2:'lim(x→a) f = ±∞'         }
      ]},
    { id:'s2c', label:'One-Sided & Sandwich',
      topics:[
        { label:'Left-hand',     p1:'lim(x→a⁻) f(x)',         p2:'approach from left'       },
        { label:'Right-hand',    p1:'lim(x→a⁺) f(x)',         p2:'approach from right'      },
        { label:'Sandwich Thm',  p1:'g ≤ f ≤ h',              p2:'lim g=lim h ⟹ lim f=L'  }
      ]},
    { id:'s2d', label:'Continuity',
      topics:[
        { label:'① f(c) exists', p1:'f(c) is defined',         p2:'no hole at c'             },
        { label:'② lim exists',  p1:'lim(x→c) f(x) ∃',        p2:'L⁺ = L⁻'                 },
        { label:'③ lim = f(c)',  p1:'lim f(x) = f(c)',         p2:'all 3 ⟹ continuous'      }
      ]}
  ]
};
// ── CH3: DIFFERENTIATION ─────────────────────────────────────
// bottom-left: fans downward
const CH3={
  id:'c3', label:'Chapter 3', sub:'Differentiation',
  col:COL.c3, cx:960, cy:CH_Y_BOT, side:'BL',
  secXs:SEC_X_L, secY:SEC_Y_BOT, topY:TOP_Y_BOT,
  p1Y:P1_Y_BOT,
  sections:[
    { id:'s3a', label:'Derivative Defn.',
      topics:[
        { label:'Limit Form',
          p1:F('f(x+h)−f(x)','h','lim '),
          p2:'as  h → 0'                                                        },
        { label:'Slope of Tangent',
          p1:F('Δy','Δx'),
          p2:'instantaneous rate'                                                },
        { label:'Notation',
          p1:"f′(x)  =  y′",
          p2:F('dy','dx')                                                        }
      ]},
    { id:'s3b', label:'Core Rules',
      topics:[
        { label:'Power Rule',
          p1:"(xⁿ)′ = nxⁿ⁻¹",
          p2:"(c)′ = 0"                                                          },
        { label:'Product Rule',
          p1:"(fg)′=f′g+fg′",
          p2:'both factors diff.'                                                },
        { label:'Quotient Rule',
          p1:F("f′g − fg′","g²"),
          p2:'g(x) ≠ 0'                                                         }
      ]},
    { id:'s3c', label:'Trig Derivatives',
      topics:[
        { label:'sin & cos',
          p1:"(sin x)′ = cos x",
          p2:"(cos x)′ = −sin x"                                                },
        { label:'tan & cot',
          p1:"(tan x)′ = sec²x",
          p2:"(cot x)′ = −csc²x"                                               },
        { label:'sec & csc',
          p1:"(sec x)′ = sec·tan",
          p2:"(csc x)′ = −csc·cot"                                             }
      ]},
    { id:'s3d', label:'Chain Rule & Higher',
      topics:[
        { label:'Chain Rule',
          p1:F('dy','dx'),
          p2:FF('dy','du','·','du','dx')                                         },
        { label:'2nd Derivative',
          p1:"f″(x) = (f′)′",
          p2:F('d²y','dx²')                                                      },
        { label:'Implicit Diff.',
          p1:F('dy','dx','find '),
          p2:F('d','dx','apply ','  to both')                                    }
      ]}
  ]
};
// ── CH4: APPLICATIONS OF DIFFERENTIATION ─────────────────────
// bottom-right: fans downward
const CH4={
  id:'c4', label:'Chapter 4', sub:'Applications of Diff.',
  col:COL.c4, cx:2640, cy:CH_Y_BOT, side:'BR',
  secXs:SEC_X_R, secY:SEC_Y_BOT, topY:TOP_Y_BOT,
  p1Y:P1_Y_BOT,
  sections:[
    { id:'s4a', label:'Extrema (Max & Min)',
      topics:[
        { label:'Critical Points',
          p1:"f′(c) = 0 or undef.",
          p2:'find all candidates'                                               },
        { label:'1st Deriv. Test',
          p1:"f′: + → −: local max",
          p2:"f′: − → +: local min"                                             },
        { label:'2nd Deriv. Test',
          p1:"f″(c) < 0 → max",
          p2:"f″(c) > 0 → min"                                                  }
      ]},
    { id:'s4b', label:'Fundamental Theorems',
      topics:[
        { label:'MVT',
          p1:F('f(b)−f(a)','b−a','f′(c) = '),
          p2:'∃ c ∈ (a, b)'                                                      },
        { label:"Rolle's Theorem",
          p1:'f(a) = f(b)',
          p2:"∃ c: f′(c) = 0"                                                   },
        { label:'EVT',
          p1:'f  cont. on [a, b]',
          p2:'abs. max & min exist'                                              }
      ]},
    { id:'s4c', label:'Function Analysis',
      topics:[
        { label:'Incr. / Decr.',
          p1:"f′(x) > 0  →  ↑",
          p2:"f′(x) < 0  →  ↓"                                                  },
        { label:'Concavity',
          p1:"f″(x) > 0: concave ∪",
          p2:"f″(x) < 0: concave ∩"                                             },
        { label:'Inflection Pts.',
          p1:"f″(c) = 0 or undef.",
          p2:'concavity changes'                                                 }
      ]},
    { id:'s4d', label:'Curve Sketching',
      topics:[
        { label:'Domain & Intercepts',
          p1:'find D(f),  x & y int.',
          p2:'set f=0, then x=0'                                                 },
        { label:'Asymptotes',
          p1:'H: y = L,  V: x = a',
          p2:F('f(x)','g(x)','lim ')                                             },
        { label:'Sketch Steps',
          p1:"domain→intercepts",
          p2:"asympt.→f′→f″→draw"                                              }
      ]}
  ]
};
// ── CHAPTERS ARRAY ────────────────────────────────────────────
const CHAPTERS=[CH1,CH2,CH3,CH4];

// ── SVG INFRASTRUCTURE ───────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
const mapEl=document.getElementById('map');
const GROUPS={};

// Create SVG element with attributes
function mk(tag,a){
  const e=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(a)) e.setAttribute(k,v);
  return e;
}

// Append text node to group
function txt(g,s,a){
  const e=mk('text',a);
  e.textContent=s;
  g.appendChild(e);
  return e;
}

// Cubic bezier (vertical S-curve) between two points
function curve(g,x1,y1,x2,y2,col,op,sw){
  const my=(y1+y2)/2;
  g.appendChild(mk('path',{
    d:`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`,
    fill:'none', stroke:col,
    'stroke-width':sw, 'stroke-opacity':op, 'stroke-linecap':'round'
  }));
}

// Straight connector line
function seg(g,x1,y1,x2,y2,col,op,sw){
  g.appendChild(mk('line',{
    x1,y1,x2,y2, stroke:col,
    'stroke-width':sw, 'stroke-opacity':op, 'stroke-linecap':'round'
  }));
}

// Create a named group and register it for opacity control
function grp(id){
  const g=mk('g',{id:'g-'+id,class:'mg'});
  mapEl.appendChild(g);
  GROUPS[id]=g;
  return g;
}

// Pill type guards
const isFrac=p=>p&&typeof p==='object'&&'n' in p;
const isFF  =p=>p&&typeof p==='object'&&'n1' in p;

// ── FRACTION RENDERER ────────────────────────────────────────
const MONO="'IBM Plex Mono',monospace";
const CPX =4.8;   // px per char in IBM Plex Mono at 8px

// Vinculum half-length from char count
function vinLen(n,d){ return Math.max(n.length,d.length)*2.55+4; }

// Draw stacked fraction group at (cx,cy) in parent g
function drawFracGroup(g,cx,cy,n,d,col,fs=8){
  const vl=vinLen(n,d);
  const fg=mk('g',{transform:`translate(${cx},${cy})`});
  const tn=mk('text',{y:-5,'text-anchor':'middle','font-family':MONO,'font-size':fs,fill:col});
  tn.textContent=n; fg.appendChild(tn);
  fg.appendChild(mk('line',{x1:-vl,x2:vl,y1:0,y2:0,stroke:col,'stroke-width':0.9,'stroke-opacity':0.85}));
  const td=mk('text',{y:12,'text-anchor':'middle','font-family':MONO,'font-size':fs,fill:col});
  td.textContent=d; fg.appendChild(td);
  g.appendChild(fg);
}

// Draw plain text pill centered at (px,py)
function drawTxtPill(g,px,py,val,col,colL){
  const hw=PW/2, hh=PHT/2;
  g.appendChild(mk('rect',{x:px-hw,y:py-hh,width:PW,height:PHT,rx:7,
    fill:colL,stroke:col,'stroke-opacity':0.4,'stroke-width':1.1}));
  const e=mk('text',{x:px,y:py+4,'text-anchor':'middle',
    'font-family':MONO,'font-size':8.5,fill:col,
    textLength:106,lengthAdjust:'spacingAndGlyphs'});
  e.textContent=String(val); g.appendChild(e);
}

// Draw single-fraction pill  {n,d,pre,suf}  centered at (px,py)
function drawFPill(g,px,py,pill,col,colL){
  const hw=PW/2, hh=PHF/2;
  g.appendChild(mk('rect',{x:px-hw,y:py-hh,width:PW,height:PHF,rx:8,
    fill:colL,stroke:col,'stroke-opacity':0.45,'stroke-width':1.1,filter:'url(#sh3)'}));
  const {n,d,pre='',suf=''}=pill;
  const fs=8;
  const preW=pre.length*CPX*0.88;
  const sufW=suf.length*CPX*0.88;
  const fracW=Math.max(n.length,d.length)*CPX+10;
  const totalW=preW+fracW+sufW;
  let sx=px-totalW/2;
  // prefix
  if(pre){
    const tp=mk('text',{x:sx+preW/2,y:py+4,'text-anchor':'middle',
      'font-family':MONO,'font-size':fs,fill:col});
    tp.textContent=pre; g.appendChild(tp);
  }
  // fraction centered in its slot
  drawFracGroup(g,sx+preW+fracW/2,py,n,d,col,fs);
  // suffix
  if(suf){
    const ts=mk('text',{x:sx+preW+fracW+sufW/2,y:py+4,'text-anchor':'middle',
      'font-family':MONO,'font-size':fs,fill:col});
    ts.textContent=suf; g.appendChild(ts);
  }
}

// Draw double-fraction pill  {n1,d1,op,n2,d2}  centered at (px,py)
function drawFFPill(g,px,py,pill,col,colL){
  const hw=PW/2, hh=PHF/2;
  g.appendChild(mk('rect',{x:px-hw,y:py-hh,width:PW,height:PHF,rx:8,
    fill:colL,stroke:col,'stroke-opacity':0.45,'stroke-width':1.1,filter:'url(#sh3)'}));
  const {n1,d1,op,n2,d2}=pill;
  const fs=7.8;
  const fw1=Math.max(n1.length,d1.length)*CPX*0.9+8;
  const fw2=Math.max(n2.length,d2.length)*CPX*0.9+8;
  const opW=op.length*CPX+8;
  const totalW=fw1+opW+fw2;
  const sx=px-totalW/2;
  drawFracGroup(g,sx+fw1/2,       py,n1,d1,col,fs);
  const top=mk('text',{x:sx+fw1+opW/2,y:py+4,'text-anchor':'middle',
    'font-family':MONO,'font-size':fs+1,fill:col});
  top.textContent=op; g.appendChild(top);
  drawFracGroup(g,sx+fw1+opW+fw2/2,py,n2,d2,col,fs);
}

// Unified pill dispatcher
function drawPill(g,px,py,pill,col,colL){
  if(isFF(pill))        drawFFPill(g,px,py,pill,col,colL);
  else if(isFrac(pill)) drawFPill (g,px,py,pill,col,colL);
  else                  drawTxtPill(g,px,py,pill,col,colL);
}

// ── BUILD: ROOT + CHAPTERS ────────────────────────────────────
const SERIF ="'Cormorant Garamond',serif";
const SANS  ="'IBM Plex Sans',sans-serif";
const isTop =ch=>ch.cy<RY;   // true for TL / TR chapters

function buildRoot(){
  const g=grp('root');
  // root → each chapter connector
  for(const ch of CHAPTERS){
    const top=isTop(ch);
    curve(g, RX, top?RY-50:RY+50,
             ch.cx, top?ch.cy+40:ch.cy-40,
             GOLD, 0.55, 2.2);
  }
  // root ellipse
  g.appendChild(mk('ellipse',{cx:RX,cy:RY,rx:158,ry:50,
    fill:'#fff',stroke:GOLD,'stroke-width':2.4,filter:'url(#sh)'}));
  txt(g,'Math 101',{x:RX,y:RY-9,'text-anchor':'middle',
    'font-family':SERIF,'font-size':24,'font-weight':600,fill:INK});
  txt(g,'King Saud University',{x:RX,y:RY+15,'text-anchor':'middle',
    'font-family':SANS,'font-size':11.5,fill:GRAY});
}

function buildChapters(){
  for(const ch of CHAPTERS){
    const g=grp(ch.id);
    const{s:c,l:cl}=ch.col;
    const top=isTop(ch);
    // chapter ellipse
    g.appendChild(mk('ellipse',{cx:ch.cx,cy:ch.cy,rx:130,ry:41,
      fill:cl,stroke:c,'stroke-width':2.2,filter:'url(#sh)'}));
    txt(g,ch.label,{x:ch.cx,y:ch.cy-10,'text-anchor':'middle',
      'font-family':SANS,'font-size':15,'font-weight':700,fill:INK});
    txt(g,ch.sub,  {x:ch.cx,y:ch.cy+13,'text-anchor':'middle',
      'font-family':SANS,'font-size':9.5,fill:GRAY});
  }
}

// ── BUILD: SECTIONS ───────────────────────────────────────────
function buildSections(){
  for(const ch of CHAPTERS){
    const{s:c,l:cl}=ch.col;
    const top=isTop(ch);
    // edge of chapter ellipse toward sections
    const chEdgeY=top ? ch.cy-41 : ch.cy+41;
    // edge of section rect facing the chapter
    const secEdge=top ? ch.secY+26 : ch.secY-26;

    for(let i=0;i<ch.sections.length;i++){
      const sec=ch.sections[i];
      const sx=ch.secXs[i];
      const g=grp(sec.id);

      // chapter → section S-curve (lives in section group so it fades with section)
      curve(g, ch.cx,chEdgeY, sx,secEdge, c,0.52,1.8);

      // section rounded rect
      g.appendChild(mk('rect',{
        x:sx-96, y:ch.secY-26, width:192, height:52, rx:13,
        fill:cl, stroke:c, 'stroke-width':1.9, filter:'url(#sh2)'
      }));

      // section label centred vertically in rect
      txt(g,sec.label,{
        x:sx, y:ch.secY+5,
        'text-anchor':'middle',
        'font-family':SANS, 'font-size':11, 'font-weight':700, fill:INK
      });
    }
  }
}

// ── BUILD: TOPICS + PILLS ─────────────────────────────────────
function buildTopicsAndPills(){
  for(const ch of CHAPTERS){
    const{s:c,l:cl}=ch.col;
    const top=isTop(ch);

    for(let i=0;i<ch.sections.length;i++){
      const sec=ch.sections[i];
      const sx=ch.secXs[i];
      const g=GROUPS[sec.id];           // reuse group created in buildSections
      const txs=[sx-T_OFF, sx, sx+T_OFF];

      // section → topic S-curves
      const secEdge=top ? ch.secY-26 : ch.secY+26;
      const topEdge=top ? ch.topY+16 : ch.topY-16;
      for(const tx of txs) curve(g,sx,secEdge,tx,topEdge,c,0.38,1.4);

      for(let j=0;j<sec.topics.length;j++){
        const t=sec.topics[j];
        const tx=txs[j];

        // ── topic rect ──
        g.appendChild(mk('rect',{
          x:tx-58, y:ch.topY-16, width:116, height:32, rx:9,
          fill:'#fff', stroke:c, 'stroke-width':1.8, filter:'url(#sh2)'
        }));
        txt(g,t.label,{
          x:tx, y:ch.topY+5, 'text-anchor':'middle',
          'font-family':SANS, 'font-size':10.5, 'font-weight':600, fill:INK
        });

        // ── topic → pill connector ──
        const topicFace=top ? ch.topY-16 : ch.topY+16;
        const pillNear =top ? ch.p1Y+22  : ch.p1Y-22;
        seg(g,tx,topicFace,tx,pillNear,c,0.32,1.1);

        // ── single pill per topic ──
        drawPill(g,tx,ch.p1Y,t.p1,c,cl);
      }
    }
  }
}

// ── BUILD ASSEMBLER ───────────────────────────────────────────
function build(){
  buildRoot();
  buildChapters();
  buildSections();
  buildTopicsAndPills();
}
build();

const TOTAL=VIEWS.length;

// ── OPACITY MAP ───────────────────────────────────────────────
const DIM=0.07, SEMI=0.35, VIS=1;
const ALL_IDS=['root','c1','c2','c3','c4',
  's1a','s1b','s1c','s1d','s2a','s2b','s2c','s2d',
  's3a','s3b','s3c','s3d','s4a','s4b','s4c','s4d'];

function makeOps(show){
  const r={};
  for(const k of ALL_IDS) r[k]=DIM;
  for(const[k,v] of Object.entries(show)) r[k]=v;
  return r;
}

const ALL_VIS=Object.fromEntries(ALL_IDS.map(k=>[k,VIS]));
const OPS=[
  makeOps(ALL_VIS),                                                                                          // 0  title        – all visible
  makeOps({root:SEMI,c1:VIS,c2:VIS,s1a:VIS,s1b:VIS,s1c:VIS,s1d:VIS,s2a:VIS,s2b:VIS,s2c:VIS,s2d:VIS}),   // 1  top half
  makeOps({c1:VIS,s1a:VIS,s1b:VIS,s1c:VIS,s1d:VIS}),                                                      // 2  ch1 overview
  makeOps({c1:SEMI,s1a:VIS,s1b:VIS}),                                                                      // 3  ch1 sec 1-2
  makeOps({c1:SEMI,s1c:VIS,s1d:VIS}),                                                                      // 4  ch1 sec 3-4
  makeOps({c2:VIS,s2a:VIS,s2b:VIS,s2c:VIS,s2d:VIS}),                                                      // 5  ch2 overview
  makeOps({c2:SEMI,s2a:VIS,s2b:VIS}),                                                                      // 6  ch2 sec 1-2
  makeOps({c2:SEMI,s2c:VIS,s2d:VIS}),                                                                      // 7  ch2 sec 3-4
  makeOps({root:SEMI,c3:VIS,c4:VIS,s3a:VIS,s3b:VIS,s3c:VIS,s3d:VIS,s4a:VIS,s4b:VIS,s4c:VIS,s4d:VIS}),   // 8  bottom half
  makeOps({c3:VIS,s3a:VIS,s3b:VIS,s3c:VIS,s3d:VIS}),                                                      // 9  ch3 overview
  makeOps({c3:SEMI,s3a:VIS,s3b:VIS}),                                                                      // 10 ch3 sec 1-2
  makeOps({c3:SEMI,s3c:VIS,s3d:VIS}),                                                                      // 11 ch3 sec 3-4
  makeOps({c4:VIS,s4a:VIS,s4b:VIS,s4c:VIS,s4d:VIS}),                                                      // 12 ch4 overview
  makeOps({c4:SEMI,s4a:VIS,s4b:VIS}),                                                                      // 13 ch4 sec 1-2
  makeOps({c4:SEMI,s4c:VIS,s4d:VIS}),                                                                      // 14 ch4 sec 3-4

// ── SET OPACITIES ─────────────────────────────────────────────
function setOpacities(ops){
  for(const[id,val] of Object.entries(ops)){
    const g=GROUPS[id]; if(g) g.style.opacity=val;
  }
}

// ── APPLY VIEW ────────────────────────────────────────────────
const tintEl=document.getElementById('bg-tint');
const ovEl  =document.getElementById('ov');
const tpEl  =document.getElementById('tp');
const hintEl=document.getElementById('hint');

function applyView(v,animate){
  const VW=innerWidth, VH=innerHeight;
  const scale=Math.min(VW/v.w, VH/v.h)*0.92;
  const tx=VW/2-v.cx*scale, ty=VH/2-v.cy*scale;
  mapEl.style.transition=animate?'transform 1.1s cubic-bezier(.77,0,.18,1)':'none';
  mapEl.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;

  // overlay label
  document.getElementById('ov-tag').textContent  =v.tag;
  document.getElementById('ov-title').textContent=v.title;
  ovEl.style.opacity=(v.tag||v.title)?'1':'0';

  // title panel
  tpEl.classList.toggle('vis',!!v.panel);

  // navigation hint
  hintEl.style.opacity=v.hint?'1':'0';

  // background tint (chapter colour at ~4% opacity)
  if(v.ch){
    const ch=CHAPTERS.find(c=>c.id===v.ch);
    tintEl.style.backgroundColor=ch.col.tint;
    tintEl.style.opacity='1';
  } else {
    tintEl.style.opacity='0';
  }
}

// ── NAVIGATION ───────────────────────────────────────────────
const progEl   =document.getElementById('prog');
const counterEl=document.getElementById('counter');
const dotsEl   =document.getElementById('dots');

// Build dot indicators
for(let i=0;i<TOTAL;i++){
  const d=document.createElement('div');
  d.className='dot'+(i===0?' act':'');
  d.onclick=()=>goTo(i);
  dotsEl.appendChild(d);
}

function updateUI(){
  // progress bar
  progEl.style.width=(cur/(TOTAL-1)*100)+'%';
  // slide counter
  counterEl.textContent=(cur+1)+' / '+TOTAL;
  // dots
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('act',i===cur);
    // colour active dot to match chapter
    if(i===cur&&VIEWS[cur].ch){
      const ch=CHAPTERS.find(c=>c.id===VIEWS[cur].ch);
      d.style.background=ch.col.s;
    } else if(i===cur){
      d.style.background=GOLD;
    } else {
      d.style.background='';
    }
  });
}

function goTo(next){
  if(next<0||next>=TOTAL) return;
  cur=next;
  applyView(VIEWS[cur],true);
  setOpacities(OPS[cur]);
  updateUI();
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(document.body.classList.contains('pre-start')){
    if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter'){e.preventDefault();startMap();}
    return;
  }
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goTo(cur+1);}
  if(e.key==='ArrowLeft') {e.preventDefault();goTo(cur-1);}
});

// Touch swipe
let _tx=0;
document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',  e=>{
  if(document.body.classList.contains('pre-start')) return;
  const dx=e.changedTouches[0].clientX-_tx;
  if(Math.abs(dx)>50) goTo(dx<0?cur+1:cur-1);
},{passive:true});

// Resize
window.addEventListener('resize',()=>applyView(VIEWS[cur],false));

// ── BOOT ──────────────────────────────────────────────────────
applyView(VIEWS[0],false);   // position map while SVG is hidden

// ── START: intro → mindmap build ──────────────────────────────
let _introStarted=false;
function startMap(){
  if(_introStarted) return;
  _introStarted=true;

  const intro=document.getElementById('intro');
  intro.classList.add('out');

  setTimeout(()=>{
    intro.style.display='none';
    document.body.classList.remove('pre-start');
    applyView(VIEWS[0],false);

    // Build order: root → chapters → sections (inner to outer), each element staggered
    const order=[
      'root',
      'c1','c2','c3','c4',
      's1a','s2a','s3a','s4a',
      's1b','s2b','s3b','s4b',
      's1c','s2c','s3c','s4c',
      's1d','s2d','s3d','s4d',
    ];

    // Pre-hide all with translate offset
    order.forEach(id=>{
      const g=GROUPS[id]; if(!g) return;
      g.style.transition='none';
      g.style.opacity='0';
      g.style.transform='translateY(18px)';
    });

    // Stagger each group in with opacity + slide-up
    order.forEach((id,i)=>{
      const g=GROUPS[id]; if(!g) return;
      const delay=60+i*85;  // 85 ms between each group
      setTimeout(()=>{
        g.style.transition='opacity .75s cubic-bezier(.22,1,.36,1), transform .75s cubic-bezier(.22,1,.36,1)';
        g.style.opacity='1';
        g.style.transform='translateY(0)';
      }, delay);
      // Clear overrides once done so normal dimming system works cleanly
      setTimeout(()=>{
        g.style.transition='';
        g.style.transform='';
      }, delay+820);
    });

    // Hand off to navigation after last group settles
    const total=60+order.length*85+840;
    setTimeout(()=>{ setOpacities(OPS[0]); updateUI(); }, total);
  }, 820);
}

// ── FLOATING ROTATING SYMBOLS (canvas) ───────────────────────
(function(){
  const c  =document.getElementById('bgc');
  const ctx=c.getContext('2d');

  const SYMS=[
    '∑','∫','∂','∞','π','√','Δ','∇','α','β','θ','λ',
    'σ','ε','δ','φ','ℝ','ℤ','ℕ','ℚ','≤','≥','⊂','∈',
    'lim',"f′","f(x)",'→','⟺','d/dx','∀','∃','±',
    'x²','eˣ',"f⁻¹",'∮','≠','≡','∏','μ','ω','∇²','∉',
    "f″",'ℂ','⟹','∝','∠','⊥','‖','∪','∩',
  ];

  // Only elegant/distinctive fonts — no generic sans
  const FONTS=[
    `600 {sz}px 'IBM Plex Mono',monospace`,
    `italic 600 {sz}px 'Cormorant Garamond',serif`,
    `700 {sz}px 'Cormorant Garamond',serif`,
    `italic 500 {sz}px 'IBM Plex Mono',monospace`,
  ];

  // Gold-family colours at varying warmth
  const COLS=['#b8922d','#c9a44a','#9a7622','#b8922d','#d4b86a','#7a5f1a'];

  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  resize();
  addEventListener('resize',resize);

  const P=[];
  for(let i=0;i<62;i++){
    const fi=Math.floor(Math.random()*FONTS.length);
    const sz=16+Math.random()*38;
    P.push({
      x:      Math.random()*innerWidth,
      y:      Math.random()*innerHeight,
      sym:    SYMS[Math.floor(Math.random()*SYMS.length)],
      size:   sz,
      font:   FONTS[fi].replace('{sz}',sz|0),
      col:    COLS[Math.floor(Math.random()*COLS.length)],
      speed:  0.10+Math.random()*0.30,
      alpha:  0.13+Math.random()*0.13,   // 0.13–0.26 — clearly visible
      drift:  (Math.random()-0.5)*0.22,
      rot:    Math.random()*Math.PI*2,
      rotSpd: (Math.random()-0.5)*0.013,
    });
  }

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle='#f5f3ed';
    ctx.fillRect(0,0,c.width,c.height);

    for(const p of P){
      ctx.save();
      ctx.globalAlpha=p.alpha;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.font=p.font;
      ctx.fillStyle=p.col;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(p.sym,0,0);
      ctx.restore();

      p.y   -=p.speed;
      p.x   +=p.drift;
      p.rot +=p.rotSpd;

      if(p.y<-50)        { p.y=c.height+50; p.x=Math.random()*c.width; }
      if(p.x<-60)          p.x=c.width+60;
      if(p.x>c.width+60)   p.x=-60;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
