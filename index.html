<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math 101 — KSU Mind Map</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600;700&family=IBM+Plex+Mono:wght@500&family=Cormorant+Garamond:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;background:#f5f3ed}

/* background canvas behind everything */
#bgc{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* subtle vignette */
#vig{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 80% 80% at 50% 50%, transparent 55%, rgba(200,192,170,.18) 100%)}

#svg{position:fixed;inset:0;width:100%;height:100%;z-index:2}
#map{transform-origin:0 0;transition:transform 1.1s cubic-bezier(.77,0,.18,1);will-change:transform}

/* group fade */
.mg{transition:opacity 0.65s ease}

/* top overlay */
#ov{position:fixed;top:0;left:0;right:0;padding:36px 64px 0;pointer-events:none;z-index:10;transition:opacity .5s}
.ov-tag{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#b8922d;font-weight:600;margin-bottom:5px}
.ov-title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,2.8vw,38px);font-weight:600;color:#1c1b28;line-height:1.1}

/* title panel */
#tp{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:10;
  opacity:0;transition:opacity .7s;background:rgba(245,243,237,.93);border:1px solid rgba(184,146,45,.25);
  border-radius:18px;padding:22px 40px;backdrop-filter:blur(8px);white-space:nowrap}
#tp.vis{opacity:1}
.tp-ksu{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#b8922d;font-weight:600;margin-bottom:8px}
.tp-h{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,3.8vw,48px);font-weight:600;color:#1c1b28;line-height:1}
.tp-sub{font-size:13px;color:#68657d;margin-top:7px}

/* hint */
#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-size:12px;color:#a0a0b8;letter-spacing:.06em;pointer-events:none;z-index:10;transition:opacity .4s}

/* progress */
#prog{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#b8922d,#d4a84b);transition:width .6s;z-index:20;border-radius:0 2px 2px 0}

/* dots */
#dots{position:fixed;bottom:24px;right:36px;display:flex;gap:7px;z-index:20}
.dot{width:7px;height:7px;border-radius:50%;background:#c8c5d8;cursor:pointer;transition:background .3s,transform .3s}
.dot.act{background:#b8922d;transform:scale(1.45)}

/* arrows */
#aL,#aR{position:fixed;top:50%;transform:translateY(-50%);width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.1);border-radius:50%;cursor:pointer;z-index:20;color:#58556e;
  font-size:18px;backdrop-filter:blur(6px);transition:background .2s,color .2s;user-select:none;box-shadow:0 2px 12px rgba(0,0,0,.08)}
#aL:hover,#aR:hover{background:#fff;color:#1c1b28}
#aL{left:16px}#aR{right:16px}

/* counter */
#counter{position:fixed;bottom:28px;left:36px;font-size:12px;color:#a0a0b8;letter-spacing:.05em;z-index:10;pointer-events:none}
</style>
</head>
<body>

<!-- background layers -->
<canvas id="bgc"></canvas>
<div id="vig"></div>

<!-- controls -->
<div id="prog"></div>
<div id="aL" onclick="goTo(cur-1)">&#8592;</div>
<div id="aR" onclick="goTo(cur+1)">&#8594;</div>
<div id="dots"></div>
<div id="counter"></div>
<div id="ov"><div class="ov-tag" id="ov-tag"></div><div class="ov-title" id="ov-title"></div></div>
<div id="tp">
  <div class="tp-ksu">King Saud University · Math 101</div>
  <div class="tp-h">Mathematics <em style="color:#b8922d">Mind Map</em></div>
  <div class="tp-sub">Real Numbers · Functions · Limits · Derivatives</div>
</div>
<div id="hint">← → or Space to navigate</div>

<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh"  x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="5"  flood-color="#00000014"/></filter>
    <filter id="sh2" x="-6%"  y="-6%"  width="112%" height="112%"><feDropShadow dx="0" dy="1" stdDeviation="3"  flood-color="#0000000d"/></filter>
  </defs>
  <g id="map"></g>
</svg>

<script>
// ── PALETTE ───────────────────────────────────────────────────────────────────
const GOLD='#b8922d',INK='#1c1b28',GRAY='#58556e';
const C1='#1aaa7e',C1L='#e4f8f1';
const C2='#6b5ecf',C2L='#ece9fb';

// ── LAYOUT CONSTANTS ─────────────────────────────────────────────────────────
// Increased canvas, wider section gaps, more vertical breathing room
const RY=88,  CY=285, SY=488, TY=690, P1Y=758, P2Y=792, T_OFF=126;
// ↑ root y, chapter y, section y, topic y, pill1 y, pill2 y, topic horizontal offset

// ── DATA ──────────────────────────────────────────────────────────────────────
const CHAPTERS=[
  { id:'c1', x:830,  y:CY, c:C1, cl:C1L, label:'Chapter 1', sub:'Real Numbers & Functions',
    sections:[
      { id:'1.1', x:190,  label:'1.1', sub:'Number Sets & Intervals',
        topics:[
          { label:'Number Sets',    p1:'ℕ ⊂ W ⊂ ℤ ⊂ ℚ ⊂ ℝ',  p2:'ℚ ∪ (ℝ\\ℚ) = ℝ'      },
          { label:'Intervals',      p1:'(a,b): a < x < b',     p2:'[a,b]: a ≤ x ≤ b'    },
          { label:'Absolute Value', p1:'|x| ≥ 0  always',      p2:'|a+b| ≤ |a|+|b|'    }
        ]},
      { id:'1.2', x:630,  label:'1.2', sub:'Algebraic Expressions',
        topics:[
          { label:'Exponents',  p1:'aⁿ · aᵐ = aⁿ⁺ᵐ',      p2:'a⁻ⁿ = 1/aⁿ'            },
          { label:'Identities', p1:'(a±b)² = a²±2ab+b²',   p2:'(a+b)³ = a³+3a²b+...'  },
          { label:'Factoring',  p1:'a²−b²=(a+b)(a−b)',      p2:'a³±b³=(a±b)(a²∓ab+b²)' }
        ]},
      { id:'1.3', x:1070, label:'1.3', sub:'Functions',
        topics:[
          { label:'Definition', p1:'f : A → B',             p2:'Dom(f)  &  Rng(f)'      },
          { label:'Operations', p1:'f±g,  fg,  f/g',        p2:'f∘g(x) = f(g(x))'       },
          { label:'Inverse f⁻¹',p1:'requires 1-to-1',       p2:'f⁻¹∘f = identity'       }
        ]},
      { id:'1.4', x:1510, label:'1.4', sub:'Trig Functions',
        topics:[
          { label:'6 Functions', p1:'sin, cos, tan',         p2:'cot, sec, csc'          },
          { label:'Identities',  p1:'sin²θ + cos²θ = 1',    p2:'double & half angle'    },
          { label:'Inverse Trig',p1:'arcsin,  arccos',       p2:'arctan: (−π/2, π/2)'   }
        ]}
    ]},
  { id:'c2', x:2590, y:CY, c:C2, cl:C2L, label:'Chapter 2', sub:'Limits, Continuity & Derivatives',
    sections:[
      { id:'2.1', x:1910, label:'2.1', sub:'Limits',
        topics:[
          { label:'Definition', p1:'lim(x→a) f(x) = L',    p2:'ε-δ  definition'         },
          { label:'Limit Laws', p1:'sum, product, quot',    p2:'power, root'              },
          { label:'One-sided',  p1:'x→a⁺  and  x→a⁻',     p2:'exists ⟺ L⁺ = L⁻'      }
        ]},
      { id:'2.2', x:2350, label:'2.2', sub:'Limit Techniques',
        topics:[
          { label:'Substitution',  p1:'try direct sub first',p2:'factor & cancel'        },
          { label:'Indeterminate', p1:'0/0  or  ∞/∞',        p2:"L'Hôpital: f'/g'"      },
          { label:'Squeeze Thm',   p1:'g ≤ f ≤ h ⟹ same lim',p2:'sinx/x → 1 (x→0)'   }
        ]},
      { id:'2.3', x:2790, label:'2.3', sub:'Continuity',
        topics:[
          { label:'3 Conditions',  p1:'① f(a) defined',     p2:'② lim = f(a)'           },
          { label:'Discontinuity', p1:'removable, jump',     p2:'infinite type'          },
          { label:'IVT',           p1:'cont. on [a,b]',      p2:'∃ c : f(c) = k'        }
        ]},
      { id:'2.4', x:3230, label:'2.4', sub:'Derivatives',
        topics:[
          { label:'Definition',  p1:"f'(x) = lim Δy/Δx",   p2:'dy/dx  notation'        },
          { label:'Diff. Rules', p1:"(xⁿ)' = nxⁿ⁻¹",       p2:'product, quotient'       },
          { label:'Chain & Impl',p1:"(f∘g)' = f'(g)·g'",    p2:'implicit diff'          }
        ]}
    ]}
];

// ── SVG HELPERS ───────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
function mk(tag,a){const e=document.createElementNS(NS,tag);for(const[k,v] of Object.entries(a))e.setAttribute(k,v);return e}
function txt(g,s,a){const e=mk('text',a);e.textContent=s;g.appendChild(e)}
function curve(g,x1,y1,x2,y2,col,op,sw){
  const my=(y1+y2)/2;
  g.appendChild(mk('path',{d:`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`,fill:'none',stroke:col,'stroke-width':sw,'stroke-opacity':op,'stroke-linecap':'round'}));
}

// ── RENDER ────────────────────────────────────────────────────────────────────
const mapEl=document.getElementById('map');
const GROUPS={};

function grp(id){
  const g=mk('g',{'id':'g-'+id,'class':'mg'});
  mapEl.appendChild(g);
  GROUPS[id]=g;
  return g;
}

function build(){
  const RX=1710; // midpoint of ch1(830) and ch2(2590)

  // ── root ──
  const gr=grp('root');
  curve(gr,RX,RY+44,CHAPTERS[0].x,CY-36,GOLD,.65,2.4);
  curve(gr,RX,RY+44,CHAPTERS[1].x,CY-36,GOLD,.65,2.4);
  gr.appendChild(mk('ellipse',{cx:RX,cy:RY,rx:145,ry:46,fill:'#fff',stroke:GOLD,'stroke-width':2.4,filter:'url(#sh)'}));
  txt(gr,'Math 101',    {x:RX,y:RY-8, 'text-anchor':'middle','font-family':'Cormorant Garamond,serif','font-size':23,'font-weight':600,fill:INK});
  txt(gr,'King Saud University',{x:RX,y:RY+14,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':11.5,fill:GRAY});

  for(const ch of CHAPTERS){
    // ── chapter ──
    const gc=grp(ch.id);
    gc.appendChild(mk('ellipse',{cx:ch.x,cy:ch.y,rx:122,ry:38,fill:ch.cl,stroke:ch.c,'stroke-width':2.2,filter:'url(#sh)'}));
    txt(gc,ch.label,{x:ch.x,y:ch.y-8, 'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':15,'font-weight':700,fill:INK});
    txt(gc,ch.sub,   {x:ch.x,y:ch.y+12,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':9.5,fill:GRAY});

    for(const sec of ch.sections){
      // ── section ──
      const gs=grp(sec.id);
      const txs=[sec.x-T_OFF, sec.x, sec.x+T_OFF];

      // chapter → section branch (inside section group so it dims with section)
      curve(gs,ch.x,ch.y+38,sec.x,SY-25,ch.c,.5,2);

      // section rect
      gs.appendChild(mk('rect',{x:sec.x-90,y:SY-26,width:180,height:52,rx:13,fill:ch.cl,stroke:ch.c,'stroke-width':2,filter:'url(#sh2)'}));
      txt(gs,sec.label,{x:sec.x,y:SY-6, 'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':16,'font-weight':700,fill:INK});
      txt(gs,sec.sub,  {x:sec.x,y:SY+15,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':9.5,fill:GRAY});

      // section → topic branches
      for(const tx of txs) curve(gs,sec.x,SY+26,tx,TY-16,ch.c,.38,1.5);

      for(let i=0;i<sec.topics.length;i++){
        const t=sec.topics[i], tx=txs[i];

        // topic → pill lines
        gs.appendChild(mk('line',{x1:tx,y1:TY+16,x2:tx,y2:P1Y-11,stroke:ch.c,'stroke-width':1.1,'stroke-opacity':.35}));
        gs.appendChild(mk('line',{x1:tx,y1:P1Y+11,x2:tx,y2:P2Y-11,stroke:ch.c,'stroke-width':1.1,'stroke-opacity':.25}));

        // topic rect
        gs.appendChild(mk('rect',{x:tx-58,y:TY-16,width:116,height:32,rx:9,fill:'#fff',stroke:ch.c,'stroke-width':1.8,filter:'url(#sh2)'}));
        txt(gs,t.label,{x:tx,y:TY+5,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':10.5,'font-weight':600,fill:INK});

        // pill 1
        gs.appendChild(mk('rect',{x:tx-58,y:P1Y-11,width:116,height:22,rx:7,fill:ch.cl,stroke:ch.c,'stroke-opacity':.4,'stroke-width':1.1}));
        const e1=mk('text',{x:tx,y:P1Y+5,'text-anchor':'middle','font-family':'IBM Plex Mono,monospace','font-size':8.5,fill:ch.c,textLength:106,lengthAdjust:'spacingAndGlyphs'});
        e1.textContent=t.p1; gs.appendChild(e1);

        // pill 2
        gs.appendChild(mk('rect',{x:tx-58,y:P2Y-11,width:116,height:22,rx:7,fill:ch.cl,stroke:ch.c,'stroke-opacity':.4,'stroke-width':1.1}));
        const e2=mk('text',{x:tx,y:P2Y+5,'text-anchor':'middle','font-family':'IBM Plex Mono,monospace','font-size':8.5,fill:ch.c,textLength:106,lengthAdjust:'spacingAndGlyphs'});
        e2.textContent=t.p2; gs.appendChild(e2);
      }
    }
  }
}
build();

// ── OPACITY CONFIG PER VIEW ───────────────────────────────────────────────────
const DIM=0.08, SEMI=0.42;
const ALL1={root:1,c1:1,c2:1,'1.1':1,'1.2':1,'1.3':1,'1.4':1,'2.1':1,'2.2':1,'2.3':1,'2.4':1};

const OPS=[
  ALL1,
  {root:.45, c1:1,    c2:SEMI, '1.1':1,   '1.2':1,   '1.3':1,   '1.4':1,   '2.1':DIM, '2.2':DIM, '2.3':DIM, '2.4':DIM},
  {root:.22, c1:SEMI, c2:DIM,  '1.1':1,   '1.2':1,   '1.3':DIM, '1.4':DIM, '2.1':DIM, '2.2':DIM, '2.3':DIM, '2.4':DIM},
  {root:.22, c1:SEMI, c2:DIM,  '1.1':DIM, '1.2':DIM, '1.3':1,   '1.4':1,   '2.1':DIM, '2.2':DIM, '2.3':DIM, '2.4':DIM},
  {root:.45, c1:SEMI, c2:1,    '1.1':DIM, '1.2':DIM, '1.3':DIM, '1.4':DIM, '2.1':1,   '2.2':1,   '2.3':1,   '2.4':1  },
  {root:.22, c1:DIM,  c2:SEMI, '1.1':DIM, '1.2':DIM, '1.3':DIM, '1.4':DIM, '2.1':1,   '2.2':1,   '2.3':DIM, '2.4':DIM},
  {root:.22, c1:DIM,  c2:SEMI, '1.1':DIM, '1.2':DIM, '1.3':DIM, '1.4':DIM, '2.1':DIM, '2.2':DIM, '2.3':1,   '2.4':1  },
  ALL1
];

// ── VIEWS ─────────────────────────────────────────────────────────────────────
// Sections: Ch1=[190,630,1070,1510] Ch2=[1910,2350,2790,3230] Root=1710
const VIEWS=[
  {cx:1710,cy:490,w:3600,h:1080, tag:'',          title:'',                                    panel:true, hint:true },
  {cx:830, cy:370,w:1640,h:570,  tag:'Chapter 1', title:'Real Numbers & Functions',             panel:false,hint:false},
  {cx:410, cy:710,w:860, h:660,  tag:'1.1 & 1.2', title:'Number Sets · Algebraic Expressions', panel:false,hint:false},
  {cx:1350,cy:710,w:860, h:660,  tag:'1.3 & 1.4', title:'Functions · Trigonometry',             panel:false,hint:false},
  {cx:2590,cy:370,w:1640,h:570,  tag:'Chapter 2', title:'Limits, Continuity & Derivatives',     panel:false,hint:false},
  {cx:2130,cy:710,w:860, h:660,  tag:'2.1 & 2.2', title:'Limits · Limit Techniques',            panel:false,hint:false},
  {cx:3010,cy:710,w:860, h:660,  tag:'2.3 & 2.4', title:'Continuity · Derivatives',             panel:false,hint:false},
  {cx:1710,cy:490,w:3600,h:1080, tag:'',          title:'Complete Mind Map',                    panel:false,hint:false}
];
const TOTAL=VIEWS.length;
let cur=0;

function setOpacities(ops){
  for(const[id,val] of Object.entries(ops)){const g=GROUPS[id];if(g)g.style.opacity=val;}
}

function applyView(v,animate){
  const VW=window.innerWidth,VH=window.innerHeight;
  const scale=Math.min(VW/v.w,VH/v.h)*.91;
  const tx=VW/2-v.cx*scale, ty=VH/2-v.cy*scale;
  const g=document.getElementById('map');
  g.style.transition=animate?'transform 1.1s cubic-bezier(.77,0,.18,1)':'none';
  g.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('ov-tag').textContent=v.tag;
  document.getElementById('ov-title').textContent=v.title;
  document.getElementById('ov').style.opacity=(v.tag||v.title)?'1':'0';
  document.getElementById('tp').classList.toggle('vis',!!v.panel);
  document.getElementById('hint').style.opacity=v.hint?'1':'0';
}

function goTo(next){
  if(next<0||next>=TOTAL)return;
  cur=next;
  applyView(VIEWS[cur],true);
  setOpacities(OPS[cur]);
  updateUI();
}

function updateUI(){
  document.getElementById('prog').style.width=(cur/(TOTAL-1)*100)+'%';
  document.getElementById('counter').textContent=(cur+1)+' / '+TOTAL;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('act',i===cur));
}

// dots
const dw=document.getElementById('dots');
for(let i=0;i<TOTAL;i++){
  const d=document.createElement('div');
  d.className='dot'+(i===0?' act':'');
  d.onclick=()=>goTo(i);
  dw.appendChild(d);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goTo(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goTo(cur-1);}
});
let _tx=0;
document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-_tx;if(Math.abs(dx)>50)goTo(dx<0?cur+1:cur-1);},{passive:true});
window.addEventListener('resize',()=>applyView(VIEWS[cur],false));

setOpacities(OPS[0]);
applyView(VIEWS[0],false);
updateUI();

// ── FLOATING BACKGROUND SYMBOLS ───────────────────────────────────────────────
(function(){
  const c=document.getElementById('bgc');
  const ctx=c.getContext('2d');
  const syms=['∑','∫','∂','∞','π','√','Δ','∇','α','β','θ','λ','σ','ε','δ','φ','ℝ','ℤ','ℕ','ℚ','≤','≥','⊂','∈','lim',"f'","f(x)",'d/dx','→','⟺'];

  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();
  addEventListener('resize',resize);

  const P=[];
  for(let i=0;i<42;i++) P.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    sym:syms[Math.floor(Math.random()*syms.length)],
    size:13+Math.random()*24,
    speed:.1+Math.random()*.28,
    alpha:.038+Math.random()*.062,
    drift:(Math.random()-.5)*.22
  });

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    // very subtle warm paper background
    ctx.fillStyle='#f5f3ed';
    ctx.fillRect(0,0,c.width,c.height);
    for(const p of P){
      ctx.save();
      ctx.globalAlpha=p.alpha;
      ctx.font=`${p.size}px IBM Plex Mono,monospace`;
      ctx.fillStyle='#b8922d';
      ctx.fillText(p.sym,p.x,p.y);
      ctx.restore();
      p.y-=p.speed; p.x+=p.drift;
      if(p.y<-34){p.y=c.height+34;p.x=Math.random()*c.width;}
      if(p.x<-44)p.x=c.width+44;
      if(p.x>c.width+44)p.x=-44;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
