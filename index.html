<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رياضيات 101 — جامعة الملك سعود</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#07080d;
  --gold:#c9a84c;
  --gold2:#e8c97a;
  --text:#eeeaf2;
  --text2:#8a8799;
  --text3:#45435a;
  --border:rgba(255,255,255,0.07);
  --c1:#1fad84;
  --c2:#c94c4c;
  --c3:#4c7ec9;
  --c4:#c9854c;
}
html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;cursor:none}

/* ── CURSOR ────────────────────────────────────────────── */
#cur{
  position:fixed;width:14px;height:14px;
  border:1.5px solid rgba(201,168,76,.55);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,background .15s,border-color .15s;
}
#cur.big{width:32px;height:32px;border-color:var(--gold);background:rgba(201,168,76,.07)}

/* ── FLOATING SYMBOLS ──────────────────────────────────── */
#mbg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ms{
  position:absolute;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  color:rgba(201,168,76,0.045);user-select:none;will-change:transform,opacity;
  animation:rise linear infinite;
}
@keyframes rise{
  0%  {transform:translateY(105vh) rotate(-6deg);opacity:0}
  7%  {opacity:1}
  93% {opacity:1}
  100%{transform:translateY(-10vh) rotate(10deg);opacity:0}
}

/* ── HEADER ────────────────────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;height:48px;z-index:100;
  background:rgba(7,8,13,0.88);backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo-ring{
  width:28px;height:28px;border-radius:50%;
  border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--gold);
}
.hlogo-text{font-size:13px;font-weight:600;color:var(--text)}
.hlogo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.hacts{display:flex;align-items:center;gap:6px}
.hab{
  background:rgba(255,255,255,.03);border:0.5px solid var(--border);border-radius:7px;
  color:var(--text2);font-family:inherit;font-size:11px;padding:5px 13px;cursor:none;
  transition:all .15s;
}
.hab:hover{color:var(--text);background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14)}

/* ── CHAPTER LEGEND ────────────────────────────────────── */
#legend{
  position:fixed;top:60px;right:16px;z-index:90;
  background:rgba(7,8,13,.82);backdrop-filter:blur(14px);
  border:0.5px solid var(--border);border-radius:12px;
  padding:12px 14px;min-width:170px;
}
.leg-title{font-size:10px;color:var(--text3);letter-spacing:.1em;margin-bottom:9px}
.leg-item{display:flex;align-items:center;gap:9px;margin-bottom:7px;cursor:none}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-size:11px;color:var(--text2)}
.leg-item:hover .leg-lbl{color:var(--text)}

/* ── CANVAS ────────────────────────────────────────────── */
#cw{position:fixed;top:48px;inset-inline:0;bottom:0;overflow:hidden;cursor:none;z-index:10}
#svg{position:absolute;top:0;left:0;overflow:visible}

/* ── ZOOM FAB ──────────────────────────────────────────── */
#zfabs{position:fixed;bottom:22px;left:18px;display:flex;flex-direction:column;gap:4px;z-index:90}
.zfb{
  width:34px;height:34px;
  background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.12);
  color:var(--text2);border-radius:9px;cursor:none;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;
}
.zfb:hover{color:var(--text);background:rgba(255,255,255,.08)}

/* ── DETAIL PANEL ──────────────────────────────────────── */
#dp{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(7,8,13,.97);backdrop-filter:blur(28px);
  border-top:0.5px solid var(--border);
  padding:18px 24px 24px;
  transform:translateY(102%);
  transition:transform .38s cubic-bezier(.4,0,.2,1);
}
#dp.open{transform:translateY(0)}
#dp-bar{position:absolute;top:0;left:0;right:0;height:1.5px;transition:background .3s}
#dp-x{position:absolute;top:12px;left:18px;background:none;border:none;color:var(--text3);font-size:17px;cursor:none;padding:2px 6px;border-radius:5px;transition:color .15s;font-family:inherit}
#dp-x:hover{color:var(--text)}
#dp-ttl{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px}
#dp-dsc{font-size:12.5px;color:var(--text2);line-height:1.78;margin-bottom:11px}
#dp-tgs{display:flex;flex-wrap:wrap;gap:6px}
.dptg{font-size:10.5px;color:var(--text2);background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:30px;padding:3px 11px}

/* ── MINI HINT ─────────────────────────────────────────── */
#hint{
  position:fixed;bottom:20px;right:18px;z-index:90;
  font-size:10.5px;color:var(--text3);
  background:rgba(7,8,13,.7);border:0.5px solid var(--border);
  border-radius:20px;padding:4px 13px;pointer-events:none;
  letter-spacing:.04em;
}
</style>
</head>
<body>
<div id="cur"></div>
<div id="mbg"></div>

<div id="hdr">
  <div class="hlogo">
    <div class="hlogo-ring">∑</div>
    <div>
      <div class="hlogo-text">رياضيات ١٠١</div>
      <div class="hlogo-sub">جامعة الملك سعود</div>
    </div>
  </div>
  <div class="hacts">
    <button class="hab" onclick="resetV()">↺ إعادة ضبط</button>
    <button class="hab" onclick="exportS()">⬇ تصدير SVG</button>
  </div>
</div>

<div id="legend">
  <div class="leg-title">الفصول</div>
  <div class="leg-item" onclick="focusCh(0)"><div class="leg-dot" style="background:var(--c1)"></div><span class="leg-lbl">النهايات والاستمرارية</span></div>
  <div class="leg-item" onclick="focusCh(1)"><div class="leg-dot" style="background:var(--c2)"></div><span class="leg-lbl">التفاضل</span></div>
  <div class="leg-item" onclick="focusCh(2)"><div class="leg-dot" style="background:var(--c3)"></div><span class="leg-lbl">التكامل</span></div>
  <div class="leg-item" onclick="focusCh(3)"><div class="leg-dot" style="background:var(--c4)"></div><span class="leg-lbl">المتتاليات والمتسلسلات</span></div>
</div>

<div id="cw"><svg id="svg"></svg></div>

<div id="zfabs">
  <button class="zfb" onclick="btnZoom(1.15)">＋</button>
  <button class="zfb" onclick="btnZoom(.87)">－</button>
</div>

<p id="hint">اسحب • عجلة للتكبير حول الماوس • اضغط على عقدة للتفاصيل</p>

<div id="dp">
  <div id="dp-bar"></div>
  <button id="dp-x" onclick="closeDp()">✕</button>
  <div id="dp-ttl"></div>
  <p id="dp-dsc"></p>
  <div id="dp-tgs"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════
const TREE = {
  label:'رياضيات\n١٠١',
  chapters:[
    {
      id:1,color:'#1fad84',label:'النهايات\nوالاستمرارية',
      desc:'سلوك الدوال عند الاقتراب من نقطة وشروط الاستمرارية.',
      tags:['الفصل الأول'],
      nodes:[
        {label:'نهاية\nالدالة',
         desc:'lim(x→a)f(x) — القيمة التي تقترب منها الدالة عند x→a من الجانبين.',
         tags:['تعريف إبسيلون-دلتا','نهايات جانبية ±','نهايات ±∞','مبرهنة الحصر']},
        {label:'الاستمرارية',
         desc:'الدالة مستمرة عند a إذا: موجودة، لها نهاية، والنهاية = القيمة.',
         tags:['أنواع الانقطاع','نظرية IVT','الاستمرارية المنتظمة','الانقطاع القابل للإزالة']},
        {label:'نهايات\nمثلثية',
         desc:'نهايات مثلثية أساسية تُبنى عليها مشتقات الدوال المثلثية.',
         tags:['sin(x)/x → 1','(1−cosx)/x → 0','تطبيقات الاشتقاق']}
      ]
    },
    {
      id:2,color:'#c94c4c',label:'التفاضل',
      desc:'حساب معدل التغير اللحظي وتطبيقاته الهندسية والفيزيائية.',
      tags:['الفصل الثاني'],
      nodes:[
        {label:'تعريف\nالمشتقة',
         desc:"f'(x)=lim[f(x+h)−f(x)]/h — ميل المماس ومعدل التغير اللحظي.",
         tags:['التفسير الهندسي: المماس','السرعة اللحظية','عدم الاشتقاق','الاشتقاق الضمني']},
        {label:'قواعد\nالاشتقاق',
         desc:'القواعد الأساسية: القوة، الضرب، القسمة، السلسلة.',
         tags:['قاعدة القوة xⁿ','قاعدة الضرب والقسمة','Chain Rule','log, exp, trig, arctan']},
        {label:'تطبيقات\nالمشتقة',
         desc:'تحليل الدوال: الأعظمية والأدنية والتقعر وقاعدة لوبيتال.',
         tags:['القيم الحرجة','الصعود والهبوط','التعظيم/التصغير','قاعدة لوبيتال']}
      ]
    },
    {
      id:3,color:'#4c7ec9',label:'التكامل',
      desc:'عكس الاشتقاق — جمع المساحات الصغيرة اللانهائية.',
      tags:['الفصل الثالث'],
      nodes:[
        {label:'التكامل\nاللامحدود',
         desc:'∫f(x)dx=F(x)+C — إيجاد الدالة الأصلية بثابت التكامل C.',
         tags:['قاعدة القوة ∫xⁿ','التعويض u-sub','التكامل بالأجزاء','الكسور الجزئية']},
        {label:'التكامل\nالمحدد',
         desc:'النظرية الأساسية FTC: ∫ₐᵇf(x)dx = F(b)−F(a).',
         tags:['مجاميع ريمان','النظرية الأساسية FTC','خصائصه','التكامل الناقص']},
        {label:'تطبيقات\nالتكامل',
         desc:'المساحات والأحجام وأطوال الأقواس ومركز الثقل.',
         tags:['مساحة بين منحنيين','أحجام التدوير','طول القوس','مركز الثقل']}
      ]
    },
    {
      id:4,color:'#c9854c',label:'المتتاليات\nوالمتسلسلات',
      desc:'المتتاليات اللانهائية ومجاميعها وشروط التقارب.',
      tags:['الفصل الرابع'],
      nodes:[
        {label:'المتتاليات',
         desc:'متتالية هي دالة على ℕ — ندرس نهايتها وشروط تقاربها.',
         tags:['التقارب والتباعد','الحدود المحدودة','الاستكرار','مبرهنة المقارب']},
        {label:'المتسلسلات',
         desc:'مجموع حدود المتتالية اللانهائية Σaₙ — اختبارات التقارب.',
         tags:['اختبار الحد العام','اختبار التكامل','p-series','اختبار النسبة والجذر']},
        {label:'متسلسلات\nالقوى',
         desc:'Σaₙ(x−c)ⁿ — متسلسلات تايلور وماكلورين لتمثيل الدوال.',
         tags:['نصف قطر التقارب R','تايلور Taylor','ماكلورين Maclaurin','التقريب الكثيري']}
      ]
    }
  ]
};

// ════════════════════════════════════════════════════════
// FLOATING SYMBOLS
// ════════════════════════════════════════════════════════
const SYMS=['π','∑','∫','∞','∂','Δ','∇','√','α','β','θ','λ','μ','σ','φ','ψ','Ω','ℝ','ℕ','lim','dx','dy','xⁿ','∀','∃','∈','≠','≤','≥','±','∮','∝'];
const mbg=document.getElementById('mbg');
for(let i=0;i<38;i++){
  const d=document.createElement('div');d.className='ms';
  d.textContent=SYMS[i%SYMS.length];
  const sz=Math.random()*75+16;
  d.style.cssText=`left:${Math.random()*100}%;font-size:${sz}px;animation-duration:${Math.random()*32+16}s;animation-delay:${Math.random()*-50}s`;
  mbg.appendChild(d);
}

// ════════════════════════════════════════════════════════
// CURSOR
// ════════════════════════════════════════════════════════
const curEl=document.getElementById('cur');
let mouseX=0,mouseY=0;
document.addEventListener('mousemove',e=>{
  mouseX=e.clientX;mouseY=e.clientY;
  curEl.style.left=e.clientX+'px';curEl.style.top=e.clientY+'px';
});
document.addEventListener('mouseover',e=>{
  curEl.classList.toggle('big',!!(e.target.closest('button')||e.target.closest('.ng')||e.target.closest('.leg-item')));
});

// ════════════════════════════════════════════════════════
// SVG BUILDER
// ════════════════════════════════════════════════════════
const NS='http://www.w3.org/2000/svg';
let G=null;

// Layout constants
const ROOT_R=58;
const CH_R=42;
const LEAF_W=126,LEAF_H=50;
const TAG_H=20,TAG_GAP=26;
const LEVEL_ROOT=90;
const LEVEL_CH=260;
const LEVEL_LEAF=450;

// Positions computed after build
const chPositions=[];  // {x,y} per chapter
const leafPositions=[]; // per leaf

function se(tag,a,p){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(a||{}))e.setAttribute(k,v);
  if(p)p.appendChild(e);return e;
}

function buildFullMap(){
  const chs=TREE.chapters;
  const nCh=chs.length;

  // ── Horizontal spacing ─────────────────────────────
  // Each chapter group: 3 leaves, width per group
  const leafPerCh=3;
  const leafSpacing=168;
  const groupW=leafSpacing*(leafPerCh-1)+LEAF_W+40; // 40 padding each side
  const totalW=Math.max(groupW*nCh+80, window.innerWidth);
  const maxTags=4;
  const totalH=LEVEL_LEAF+LEAF_H/2+maxTags*(TAG_H+TAG_GAP)+70;

  const svg=document.getElementById('svg');
  svg.innerHTML='';
  svg.setAttribute('width',totalW);
  svg.setAttribute('height',totalH);

  G=se('g',{},svg);
  const LG=se('g',{},G);  // lines
  const NG=se('g',{},G);  // nodes

  const CX=totalW/2;

  // ── ROOT ────────────────────────────────────────────
  drawRoot(NG,CX,LEVEL_ROOT,ROOT_R);

  chs.forEach((ch,ci)=>{
    const chCX=totalW/(nCh+1)*(ci+1);
    chPositions[ci]={x:chCX,y:LEVEL_CH};

    // root→chapter edge
    bezierEdge(LG,CX,LEVEL_ROOT+ROOT_R,chCX,LEVEL_CH-CH_R,ch.color,false,3);

    // chapter node
    drawChapter(NG,chCX,LEVEL_CH,CH_R,ch);

    // leaves
    ch.nodes.forEach((node,ni)=>{
      const lx=chCX+(ni-1)*leafSpacing;
      const ly=LEVEL_LEAF;
      if(!leafPositions[ci])leafPositions[ci]=[];
      leafPositions[ci][ni]={x:lx,y:ly};

      bezierEdge(LG,chCX,LEVEL_CH+CH_R,lx,ly-LEAF_H/2,ch.color,false,1.6);
      drawLeaf(NG,lx,ly,LEAF_W,LEAF_H,ch.color,node);

      // tags
      (node.tags||[]).forEach((tag,ti)=>{
        const ty=ly+LEAF_H/2+22+ti*(TAG_H+TAG_GAP);
        bezierEdge(LG,lx,ly+LEAF_H/2,lx,ty-TAG_H/2,ch.color,true,1);
        drawTagPill(NG,lx,ty,tag,ch.color);
      });
    });
  });
}

function bezierEdge(p,x1,y1,x2,y2,col,dashed,w){
  const mY=(y1+y2)/2;
  const e=se('path',{
    d:`M${x1},${y1} C${x1},${mY+24} ${x2},${mY-24} ${x2},${y2}`,
    fill:'none',stroke:col,'stroke-width':w||1.8,opacity:'.28','stroke-linecap':'round'
  },p);
  if(dashed)e.setAttribute('stroke-dasharray','5 5');
  return e;
}

function drawRoot(p,x,y,r){
  const g=se('g',{class:'ng',style:'transition:transform .18s'},p);
  se('circle',{cx:x,cy:y,r:r+20,fill:'none',stroke:'#c9a84c','stroke-width':'1',opacity:'.07'},g);
  se('circle',{cx:x,cy:y,r:r+10,fill:'none',stroke:'#c9a84c','stroke-width':'1',opacity:'.13'},g);
  se('circle',{cx:x,cy:y,r,fill:'#07080d',stroke:'#c9a84c','stroke-width':'2'},g);
  se('circle',{cx:x,cy:y,r:r-3,fill:'#c9a84c',opacity:'.08'},g);
  se('ellipse',{cx:x-r*.2,cy:y-r*.25,rx:r*.38,ry:r*.18,fill:'rgba(255,255,255,.06)'},g);
  const lines=TREE.label.split('\n');
  lines.forEach((ln,i)=>se('text',{
    x,y:y-(lines.length-1)*9.5+i*19,
    'text-anchor':'middle','dominant-baseline':'central',
    fill:'#c9a84c','font-size':'14','font-weight':'700',
    'font-family':'IBM Plex Sans Arabic,sans-serif','letter-spacing':'.01em'
  },g).textContent=ln);
  g.addEventListener('click',()=>openDp('رياضيات ١٠١','الخريطة الذهنية الشاملة لمادة حساب التفاضل والتكامل في جامعة الملك سعود.',['الفصل الأول: النهايات','الفصل الثاني: التفاضل','الفصل الثالث: التكامل','الفصل الرابع: المتتاليات'],'#c9a84c'));
  g.addEventListener('mouseenter',()=>g.style.transform=`translate(0,-4px)`);
  g.addEventListener('mouseleave',()=>g.style.transform='');
}

function drawChapter(p,x,y,r,ch){
  const g=se('g',{class:'ng',style:'transition:transform .18s'},p);
  se('circle',{cx:x,cy:y,r:r+10,fill:'none',stroke:ch.color,'stroke-width':'1',opacity:'.1'},g);
  const fill=se('circle',{cx:x,cy:y,r,fill:ch.color,opacity:'.13'},g);
  se('circle',{cx:x,cy:y,r,fill:'none',stroke:ch.color,'stroke-width':'2'},g);
  se('ellipse',{cx:x-r*.17,cy:y-r*.24,rx:r*.32,ry:r*.16,fill:'rgba(255,255,255,.07)'},g);

  // Chapter number badge
  se('text',{
    x,y:y-r+16,
    'text-anchor':'middle','dominant-baseline':'central',
    fill:ch.color,'font-size':'9','font-weight':'600',opacity:'.7',
    'font-family':'IBM Plex Sans Arabic,sans-serif','letter-spacing':'.08em'
  },g).textContent=`ف${ch.id}`;

  const lines=ch.label.split('\n');
  lines.forEach((ln,i)=>se('text',{
    x,y:y+(i-(lines.length-1)/2)*17+(lines.length>1?3:0),
    'text-anchor':'middle','dominant-baseline':'central',
    fill:'#eeeaf2','font-size':'12.5','font-weight':'600',
    'font-family':'IBM Plex Sans Arabic,sans-serif'
  },g).textContent=ln);

  g.addEventListener('click',e=>{e.stopPropagation();openDp(ch.label,ch.desc,ch.tags,ch.color)});
  g.addEventListener('mouseenter',()=>{g.style.transform=`translate(0,-5px)`;fill.setAttribute('opacity','.22')});
  g.addEventListener('mouseleave',()=>{g.style.transform='';fill.setAttribute('opacity','.13')});
}

function drawLeaf(p,x,y,w,h,col,node){
  const g=se('g',{class:'ng',style:'transition:transform .18s'},p);
  // Shadow
  se('rect',{x:x-w/2+2,y:y-h/2+2,width:w,height:h,rx:'12',fill:'rgba(0,0,0,.5)'},g);
  const rect=se('rect',{x:x-w/2,y:y-h/2,width:w,height:h,rx:'12',fill:'#0b0c13',stroke:col,'stroke-width':'1.5'},g);
  // Top accent bar
  se('rect',{x:x-w/2+1,y:y-h/2+1,width:w-2,height:6,rx:'9',fill:col,opacity:'.65'},g);
  // Inner subtle fill
  se('rect',{x:x-w/2+5,y:y-h/2+12,width:w-10,height:h-22,rx:'7',fill:col,opacity:'.04'},g);

  const lines=node.label.split('\n');
  lines.forEach((ln,i)=>se('text',{
    x,y:y+(i-(lines.length-1)/2)*16+(lines.length>1?3:0),
    'text-anchor':'middle','dominant-baseline':'central',
    fill:'#eeeaf2','font-size':'11','font-weight':'600',
    'font-family':'IBM Plex Sans Arabic,sans-serif'
  },g).textContent=ln);

  g.addEventListener('click',e=>{e.stopPropagation();openDp(node.label,node.desc,node.tags||[],col)});
  g.addEventListener('mouseenter',()=>{g.style.transform=`translate(0,-5px)`;rect.setAttribute('stroke-width','2.2')});
  g.addEventListener('mouseleave',()=>{g.style.transform='';rect.setAttribute('stroke-width','1.5')});
}

function drawTagPill(p,x,y,text,col){
  const pw=Math.max(text.length*6.8+22,72);
  const g=se('g',{opacity:'.65'},p);
  se('rect',{x:x-pw/2,y:y-10,width:pw,height:20,rx:'10',fill:'rgba(255,255,255,.025)',stroke:col,'stroke-width':'.7',opacity:'.45'},g);
  se('text',{x,y,
    'text-anchor':'middle','dominant-baseline':'central',
    fill:'#706e88','font-size':'9','font-weight':'400',
    'font-family':'IBM Plex Sans Arabic,sans-serif'
  },g).textContent=text;
}

// ════════════════════════════════════════════════════════
// PAN & ZOOM — mouse-centered
// ════════════════════════════════════════════════════════
let sc=1,tx=0,ty=0,dragging=false,dsx=0,dsy=0;
const cw=document.getElementById('cw');

function applyT(){
  if(G)G.setAttribute('transform',`translate(${tx},${ty}) scale(${sc})`);
}

// CORRECT zoom: zooms toward mouse position
function zoomAt(mx,my,factor){
  const newSc=Math.max(.15,Math.min(4,sc*factor));
  // Adjust tx/ty so the point under the mouse stays fixed
  tx=mx-(mx-tx)*(newSc/sc);
  ty=my-(my-ty)*(newSc/sc);
  sc=newSc;
  applyT();
}

// Button zoom: zoom toward center of viewport
function btnZoom(f){
  const cx2=cw.clientWidth/2, cy2=cw.clientHeight/2;
  zoomAt(cx2,cy2,f);
}

function resetV(){
  // Fit the whole map in view
  const svgEl=document.getElementById('svg');
  const vw=cw.clientWidth, vh=cw.clientHeight;
  const sw=parseFloat(svgEl.getAttribute('width'));
  const sh=parseFloat(svgEl.getAttribute('height'));
  sc=Math.min(vw/sw, vh/sh)*0.88;
  tx=(vw-sw*sc)/2;
  ty=60*sc;
  applyT();
}

cw.addEventListener('mousedown',e=>{
  if(e.target.closest('.ng'))return;
  dragging=true;dsx=e.clientX-tx;dsy=e.clientY-ty;
  cw.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  tx=e.clientX-dsx;ty=e.clientY-dsy;applyT();
});
window.addEventListener('mouseup',()=>{dragging=false;cw.style.cursor='none'});

// Mouse-centered wheel zoom
cw.addEventListener('wheel',e=>{
  e.preventDefault();
  // Mouse position relative to canvas
  const rect=cw.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  const my=e.clientY-rect.top;
  const factor=e.deltaY<0?1.1:.91;
  zoomAt(mx,my,factor);
},{passive:false});

// Touch
let lTD=null;
cw.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;dsx=e.touches[0].clientX-tx;dsy=e.touches[0].clientY-ty}
  if(e.touches.length===2)lTD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
cw.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&dragging){tx=e.touches[0].clientX-dsx;ty=e.touches[0].clientY-dsy;applyT()}
  if(e.touches.length===2&&lTD){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-cw.getBoundingClientRect().left;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2-cw.getBoundingClientRect().top;
    zoomAt(mx,my,d/lTD);lTD=d;
  }
},{passive:true});
cw.addEventListener('touchend',()=>{dragging=false;lTD=null});

// ════════════════════════════════════════════════════════
// FOCUS ON CHAPTER (legend click)
// ════════════════════════════════════════════════════════
function focusCh(i){
  if(!chPositions[i])return;
  const{x,y}=chPositions[i];
  const vw=cw.clientWidth,vh=cw.clientHeight;
  sc=1.2;
  tx=vw/2-x*sc;
  ty=(vh-48)/2-y*sc+60;
  applyT();
}

// ════════════════════════════════════════════════════════
// DETAIL PANEL
// ════════════════════════════════════════════════════════
function openDp(title,desc,tags,col){
  document.getElementById('dp-bar').style.background=col;
  document.getElementById('dp-ttl').textContent=title.replace('\n',' ');
  document.getElementById('dp-dsc').textContent=desc;
  const dt=document.getElementById('dp-tgs');dt.innerHTML='';
  (tags||[]).forEach(t=>{const d=document.createElement('div');d.className='dptg';d.textContent=t;dt.appendChild(d)});
  document.getElementById('dp').classList.add('open');
}
function closeDp(){document.getElementById('dp').classList.remove('open')}
document.getElementById('cw').addEventListener('click',e=>{
  if(!e.target.closest('.ng'))closeDp();
});

// ════════════════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════════════════
function exportS(){
  const s=document.getElementById('svg');
  const b=new Blob([new XMLSerializer().serializeToString(s)],{type:'image/svg+xml'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='math101.svg';a.click();
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
buildFullMap();
// Small delay to let SVG render before fitting
setTimeout(resetV,80);
window.addEventListener('resize',()=>{buildFullMap();setTimeout(resetV,60)});
</script>
