<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math 101 — KSU Mind Map</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600;700&family=IBM+Plex+Mono:wght@500&family=Cormorant+Garamond:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f8f7f2;font-family:'IBM Plex Sans',sans-serif}

#svg{position:fixed;inset:0;width:100%;height:100%}
#map{transform-origin:0 0;transition:transform 1.1s cubic-bezier(.77,0,.18,1);will-change:transform}

/* ── top overlay ── */
#ov{
  position:fixed;top:0;left:0;right:0;
  padding:36px 64px 0;
  pointer-events:none;z-index:10;
  transition:opacity .5s;
}
.ov-tag{
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;
  color:#b8922d;font-weight:600;margin-bottom:5px;
}
.ov-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,2.8vw,38px);font-weight:600;
  color:#1c1b28;line-height:1.1;
}

/* ── title panel (views 0 & 7) ── */
#tp{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;z-index:10;
  opacity:0;transition:opacity .7s;
  background:rgba(248,247,242,.9);
  border:1px solid rgba(184,146,45,.2);
  border-radius:16px;padding:20px 36px;
  backdrop-filter:blur(6px);
}
#tp.vis{opacity:1}
.tp-ksu{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#b8922d;font-weight:600;margin-bottom:8px}
.tp-h{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,3.5vw,44px);font-weight:600;color:#1c1b28;line-height:1}
.tp-sub{font-size:12px;color:#68657d;margin-top:6px}

/* ── hint ── */
#hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:12px;color:#a0a0b8;letter-spacing:.06em;
  pointer-events:none;z-index:10;transition:opacity .4s;
}

/* ── progress ── */
#prog{position:fixed;top:0;left:0;height:3px;background:#b8922d;transition:width .6s;z-index:20}

/* ── dots ── */
#dots{position:fixed;bottom:24px;right:36px;display:flex;gap:7px;z-index:20}
.dot{width:7px;height:7px;border-radius:50%;background:#c8c5d8;cursor:pointer;transition:background .3s,transform .3s}
.dot.act{background:#b8922d;transform:scale(1.45)}

/* ── arrows ── */
#aL,#aR{
  position:fixed;top:50%;transform:translateY(-50%);
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.1);border-radius:50%;
  cursor:pointer;z-index:20;color:#58556e;font-size:18px;
  backdrop-filter:blur(4px);transition:background .2s;user-select:none;
}
#aL:hover,#aR:hover{background:#fff}
#aL{left:16px}#aR{right:16px}

/* ── slide counter ── */
#counter{
  position:fixed;bottom:28px;left:36px;
  font-size:12px;color:#a0a0b8;letter-spacing:.05em;
  z-index:10;pointer-events:none;
}
</style>
</head>
<body>

<div id="prog"></div>
<div id="aL" onclick="goTo(cur-1)">&#8592;</div>
<div id="aR" onclick="goTo(cur+1)">&#8594;</div>
<div id="dots"></div>
<div id="counter"></div>

<div id="ov">
  <div class="ov-tag" id="ov-tag"></div>
  <div class="ov-title" id="ov-title"></div>
</div>

<div id="tp">
  <div class="tp-ksu">King Saud University · Math 101</div>
  <div class="tp-h">Mathematics <em style="color:#b8922d">Mind Map</em></div>
  <div class="tp-sub">Real Numbers · Functions · Limits · Derivatives</div>
</div>

<div id="hint">← → or Space to navigate</div>

<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/>
    </filter>
    <filter id="sh2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0000000e"/>
    </filter>
  </defs>
  <g id="map"></g>
</svg>

<script>
// ── PALETTE ──────────────────────────────────────────────────────────────────
const GOLD='#b8922d', INK='#1c1b28', GRAY='#58556e', GRAY2='#a0a0b8';
const C1='#1aaa7e', C1L='#e6f9f2', C1M='rgba(26,170,126,.12)';
const C2='#6b5ecf', C2L='#eeebfc', C2M='rgba(107,94,207,.12)';

// ── LAYOUT CONSTANTS ─────────────────────────────────────────────────────────
const RY=80,  CY=258, SY=440, TY=618, P1Y=672, P2Y=696;
// root y, chapter y, section y, topic y, pill1 y, pill2 y
const T_OFF=108; // topic horizontal offset from section center

// ── DATA ─────────────────────────────────────────────────────────────────────
const CHAPTERS = [
  {
    x:720, y:CY, c:C1, cl:C1L, cm:C1M,
    label:'Chapter 1', sub:'Real Numbers & Functions',
    sections:[
      { x:180, label:'1.1', sub:'Number Sets & Intervals',
        topics:[
          { label:'Number Sets',    p1:'ℕ ⊂ W ⊂ ℤ ⊂ ℚ ⊂ ℝ',    p2:'ℚ ∪ (ℝ\\ℚ) = ℝ' },
          { label:'Intervals',      p1:'(a,b): a < x < b',        p2:'[a,b]: a ≤ x ≤ b' },
          { label:'Absolute Value', p1:'|x| ≥ 0  always',         p2:'|a+b| ≤ |a|+|b|' }
        ]
      },
      { x:540, label:'1.2', sub:'Algebraic Expressions',
        topics:[
          { label:'Exponents',  p1:'aⁿ · aᵐ = aⁿ⁺ᵐ',       p2:'a⁻ⁿ = 1/aⁿ' },
          { label:'Identities', p1:'(a±b)² = a²±2ab+b²',    p2:'(a±b)³ = ...' },
          { label:'Factoring',  p1:'a²−b²=(a+b)(a−b)',       p2:'a³±b³=(a±b)(...)' }
        ]
      },
      { x:900, label:'1.3', sub:'Functions',
        topics:[
          { label:'Definition', p1:'f : A → B',              p2:'Dom(f) & Rng(f)' },
          { label:'Operations', p1:'f±g, fg, f/g',           p2:'f∘g(x)=f(g(x))' },
          { label:'Inverse f⁻¹',p1:'requires 1-to-1',        p2:'f⁻¹∘f = identity' }
        ]
      },
      { x:1260, label:'1.4', sub:'Trig Functions',
        topics:[
          { label:'6 Functions', p1:'sin, cos, tan',          p2:'cot, sec, csc' },
          { label:'Identities',  p1:'sin²θ+cos²θ = 1',        p2:'double & half angle' },
          { label:'Inverse Trig',p1:'arcsin, arccos',          p2:'arctan: (−π/2, π/2)' }
        ]
      }
    ]
  },
  {
    x:2200, y:CY, c:C2, cl:C2L, cm:C2M,
    label:'Chapter 2', sub:'Limits, Continuity & Derivatives',
    sections:[
      { x:1660, label:'2.1', sub:'Limits',
        topics:[
          { label:'Definition', p1:'lim(x→a) f(x) = L',      p2:'ε-δ definition' },
          { label:'Limit Laws', p1:'sum, product, quot',       p2:'power, root' },
          { label:'One-sided',  p1:'x→a⁺  and  x→a⁻',        p2:'exists ⟺ L⁺=L⁻' }
        ]
      },
      { x:2020, label:'2.2', sub:'Limit Techniques',
        topics:[
          { label:'Substitution',  p1:'try direct sub first', p2:'factor & cancel' },
          { label:'Indeterminate', p1:'0/0  or  ∞/∞',         p2:"L'Hôpital: f'/g'" },
          { label:'Squeeze Thm',   p1:'g≤f≤h ⟹ same lim',     p2:'sinx/x → 1  (x→0)' }
        ]
      },
      { x:2380, label:'2.3', sub:'Continuity',
        topics:[
          { label:'3 Conditions',  p1:'① f(a) defined',       p2:'② lim = f(a)' },
          { label:'Discontinuity', p1:'removable, jump',       p2:'infinite type' },
          { label:'IVT',           p1:'cont. on [a,b]',        p2:'∃ c : f(c) = k' }
        ]
      },
      { x:2740, label:'2.4', sub:'Derivatives',
        topics:[
          { label:'Definition',  p1:"f'(x) = lim Δy/Δx",     p2:'dy/dx  notation' },
          { label:'Diff. Rules', p1:"(xⁿ)' = nxⁿ⁻¹",         p2:'product, quotient' },
          { label:'Chain & Impl',p1:"(f∘g)' = f'(g)·g'",      p2:'implicit diff' }
        ]
      }
    ]
  }
];

// ── SVG HELPERS ───────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
const map=document.getElementById('map');

function mk(tag,a){ const e=document.createElementNS(NS,tag); for(const[k,v] of Object.entries(a)) e.setAttribute(k,v); return e; }
function add(el){ map.appendChild(el); return el; }
function txt(s,a){ const e=mk('text',a); e.textContent=s; return add(e); }

function curve(x1,y1,x2,y2,col,op=1,sw=1.6){
  const my=(y1+y2)/2;
  add(mk('path',{d:`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`,fill:'none',stroke:col,'stroke-width':sw,'stroke-opacity':op,'stroke-linecap':'round'}));
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function build(){
  const RX=1460;

  // root → chapter curves
  for(const ch of CHAPTERS) curve(RX,RY+40,ch.x,ch.y-35,GOLD,.65,2.2);

  // root node
  add(mk('ellipse',{cx:RX,cy:RY,rx:135,ry:42,fill:'#fff',stroke:GOLD,'stroke-width':2.2,filter:'url(#sh)'}));
  txt('Math 101',{x:RX,y:RY-7,'text-anchor':'middle','font-family':'Cormorant Garamond,serif','font-size':21,'font-weight':600,fill:INK});
  txt('King Saud University',{x:RX,y:RY+13,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':11,fill:GRAY});

  for(const ch of CHAPTERS){
    // chapter → section curves
    for(const sec of ch.sections) curve(ch.x,ch.y+35,sec.x,SY-22,ch.c,.5,1.8);

    // chapter node
    add(mk('ellipse',{cx:ch.x,cy:ch.y,rx:115,ry:36,fill:ch.cl,stroke:ch.c,'stroke-width':2,filter:'url(#sh)'}));
    txt(ch.label,{x:ch.x,y:ch.y-7,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':14,'font-weight':700,fill:INK});
    txt(ch.sub,{x:ch.x,y:ch.y+11,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':9.5,fill:GRAY});

    for(const sec of ch.sections){
      const txs=[sec.x-T_OFF, sec.x, sec.x+T_OFF];

      // section → topic curves
      for(const tx of txs) curve(sec.x,SY+22,tx,TY-14,ch.c,.38,1.4);

      // section node
      add(mk('rect',{x:sec.x-83,y:SY-23,width:166,height:46,rx:12,fill:ch.cl,stroke:ch.c,'stroke-width':1.8,filter:'url(#sh2)'}));
      txt(sec.label,{x:sec.x,y:SY-5,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':15,'font-weight':700,fill:INK});
      txt(sec.sub,{x:sec.x,y:SY+13,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':9,fill:GRAY});

      // topics + pills
      for(let i=0;i<sec.topics.length;i++){
        const t=sec.topics[i], tx=txs[i];

        // topic → pill lines
        add(mk('line',{x1:tx,y1:TY+14,x2:tx,y2:P1Y-10,stroke:ch.c,'stroke-width':1,'stroke-opacity':.35}));
        add(mk('line',{x1:tx,y1:P1Y+10,x2:tx,y2:P2Y-10,stroke:ch.c,'stroke-width':1,'stroke-opacity':.25}));

        // topic rect
        add(mk('rect',{x:tx-54,y:TY-14,width:108,height:28,rx:8,fill:'#fff',stroke:ch.c,'stroke-width':1.6,filter:'url(#sh2)'}));
        txt(t.label,{x:tx,y:TY+4,'text-anchor':'middle','font-family':'IBM Plex Sans,sans-serif','font-size':10,'font-weight':600,fill:INK});

        // pill 1
        add(mk('rect',{x:tx-55,y:P1Y-10,width:110,height:20,rx:6,fill:ch.cl,stroke:ch.c,'stroke-opacity':.45,'stroke-width':1}));
        const pt1=txt(t.p1,{x:tx,y:P1Y+4,'text-anchor':'middle','font-family':'IBM Plex Mono,monospace','font-size':8,'fill':ch.c});
        pt1.setAttribute('textLength','100'); pt1.setAttribute('lengthAdjust','spacingAndGlyphs');

        // pill 2
        add(mk('rect',{x:tx-55,y:P2Y-10,width:110,height:20,rx:6,fill:ch.cl,stroke:ch.c,'stroke-opacity':.45,'stroke-width':1}));
        const pt2=txt(t.p2,{x:tx,y:P2Y+4,'text-anchor':'middle','font-family':'IBM Plex Mono,monospace','font-size':8,'fill':ch.c});
        pt2.setAttribute('textLength','100'); pt2.setAttribute('lengthAdjust','spacingAndGlyphs');
      }
    }
  }
}
build();

// ── VIEWS (cx,cy = camera center in SVG coords; w,h = viewport size in SVG coords) ────
const VIEWS=[
  // 0 Title / full map
  { cx:1460,cy:450,w:3300,h:1050, tag:'',              title:'',                              panel:true,  hint:true  },
  // 1 Chapter 1 overview
  { cx:720, cy:340,w:1400,h:520,  tag:'Chapter 1',     title:'Real Numbers & Functions',       panel:false, hint:false },
  // 2 Sections 1.1 + 1.2
  { cx:358, cy:640,w:750, h:560,  tag:'1.1 & 1.2',     title:'Number Sets · Algebraic Expressions', panel:false, hint:false },
  // 3 Sections 1.3 + 1.4
  { cx:1078,cy:640,w:750, h:560,  tag:'1.3 & 1.4',     title:'Functions · Trigonometry',       panel:false, hint:false },
  // 4 Chapter 2 overview
  { cx:2200,cy:340,w:1420,h:520,  tag:'Chapter 2',     title:'Limits, Continuity & Derivatives',panel:false, hint:false },
  // 5 Sections 2.1 + 2.2
  { cx:1838,cy:640,w:750, h:560,  tag:'2.1 & 2.2',     title:'Limits · Limit Techniques',      panel:false, hint:false },
  // 6 Sections 2.3 + 2.4
  { cx:2558,cy:640,w:750, h:560,  tag:'2.3 & 2.4',     title:'Continuity · Derivatives',        panel:false, hint:false },
  // 7 Final zoom-out
  { cx:1460,cy:450,w:3300,h:1050, tag:'',              title:'Complete Mind Map',               panel:false, hint:false }
];
const TOTAL=VIEWS.length;
let cur=0;

function applyView(v,animate){
  const VW=window.innerWidth, VH=window.innerHeight;
  const scale=Math.min(VW/v.w, VH/v.h)*0.91;
  const tx=VW/2-v.cx*scale;
  const ty=VH/2-v.cy*scale;
  const g=document.getElementById('map');
  g.style.transition=animate?'transform 1.1s cubic-bezier(.77,0,.18,1)':'none';
  g.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;

  document.getElementById('ov-tag').textContent=v.tag;
  document.getElementById('ov-title').textContent=v.title;
  document.getElementById('ov').style.opacity=(v.tag||v.title)?'1':'0';
  document.getElementById('tp').classList.toggle('vis',!!v.panel);
  document.getElementById('hint').style.opacity=v.hint?'1':'0';

  // Final view special label
  if(v.title==='Complete Mind Map'){
    document.getElementById('ov').style.opacity='1';
  }
}

function goTo(next){
  if(next<0||next>=TOTAL) return;
  cur=next;
  applyView(VIEWS[cur],true);
  updateUI();
}

function updateUI(){
  document.getElementById('prog').style.width=(cur/(TOTAL-1)*100)+'%';
  document.getElementById('counter').textContent=(cur+1)+' / '+TOTAL;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('act',i===cur));
}

// dots
const dw=document.getElementById('dots');
for(let i=0;i<TOTAL;i++){
  const d=document.createElement('div');
  d.className='dot'+(i===0?' act':'');
  d.onclick=()=>goTo(i);
  dw.appendChild(d);
}

// keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goTo(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goTo(cur-1);}
});

// touch
let _tx=0;
document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_tx;
  if(Math.abs(dx)>50) goTo(dx<0?cur+1:cur-1);
},{passive:true});

// resize
window.addEventListener('resize',()=>applyView(VIEWS[cur],false));

// init
applyView(VIEWS[0],false);
updateUI();
</script>
</body>
</html>
