<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math 101 — King Saud University</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#06070b;
  --gold:#c9a84c;
  --text:#eeeaf2;
  --text2:#8a8799;
  --text3:#3e3c52;
  --border:rgba(255,255,255,0.07);
  --c1:#1fad84;
  --c2:#7b6fd4;
}
html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif}


/* BG CANVAS */
#bgc{position:fixed;inset:0;pointer-events:none;z-index:0}

/* VIGNETTE */
#vig{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 65% 65% at 50% 50%,transparent 0%,rgba(6,7,11,.65) 100%)}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;height:48px;z-index:100;background:rgba(6,7,11,.88);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.hlogo{display:flex;align-items:center;gap:10px}
.hring{width:29px;height:29px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--gold)}
.htxt{font-size:13px;font-weight:600}
.hsub{font-size:10px;color:var(--text3);letter-spacing:.05em}
.hacts{display:flex;gap:6px}
.hab{background:transparent;border:.5px solid var(--border);border-radius:7px;color:var(--text2);font-family:inherit;font-size:11px;padding:5px 13px;transition:all .18s}
.hab:hover{color:var(--text);background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.14)}

/* LEGEND */
#leg{position:fixed;top:60px;right:14px;z-index:90;background:rgba(6,7,11,.82);backdrop-filter:blur(14px);border:.5px solid var(--border);border-radius:12px;padding:12px 16px;min-width:182px}
.lt{font-size:9.5px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px}
.li{display:flex;align-items:center;gap:9px;padding:3px 0;border-radius:5px;transition:all .15s}
.li:hover .ll{color:var(--text)}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ll{font-size:11px;color:var(--text2);transition:color .15s}

/* CANVAS */
#cw{position:fixed;top:48px;inset-inline:0;bottom:0;overflow:hidden;z-index:10}
#svg{position:absolute;overflow:visible}

/* ZOOM */
#zf{position:fixed;bottom:20px;left:16px;display:flex;flex-direction:column;gap:4px;z-index:90}
.zb{width:32px;height:32px;background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.1);color:var(--text2);border-radius:8px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.zb:hover{color:var(--text);background:rgba(255,255,255,.08)}

/* DETAIL PANEL */
#dp{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(6,7,11,.97);backdrop-filter:blur(32px);border-top:.5px solid var(--border);transform:translateY(102%);transition:transform .4s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto}
#dp.open{transform:translateY(0)}
#dp-l{position:sticky;top:0;left:0;right:0;height:2px;transition:background .3s;z-index:1;flex-shrink:0}
#dp-layout{display:flex;flex-direction:column;padding:28px 36px 36px;gap:24px;max-width:900px}
#dp-left{flex:1;min-width:0}
#dp-right{width:100%;display:flex;align-items:flex-start;justify-content:flex-start;padding:20px 0 0;border-top:.5px solid var(--border)}
#dp-right svg{max-width:100%;height:auto}
#dp-x{position:absolute;top:14px;left:20px;background:none;border:none;color:var(--text3);font-size:16px;padding:3px 7px;border-radius:5px;transition:color .15s;font-family:inherit;cursor:pointer;z-index:2}
#dp-x:hover{color:var(--text)}
#dp-meta{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
#dp-t{font-size:22px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.3}
#dp-d{font-size:13.5px;color:var(--text2);line-height:1.9;margin-bottom:22px;border-right:2px solid var(--dp-col,#c9a84c);padding-right:14px}
#dp-pts{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px}
#dp-pts li{font-size:12.5px;color:var(--text2);background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.08);border-radius:11px;padding:10px 14px;display:flex;align-items:flex-start;gap:9px;line-height:1.6}
#dp-pts li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--dp-col,#c9a84c);flex-shrink:0;margin-top:6px}
#dp-no-diagram{font-size:11px;color:var(--text3);padding:12px 0}

#hint{position:fixed;bottom:18px;right:16px;z-index:90;font-size:10px;color:var(--text3);background:rgba(6,7,11,.7);border:.5px solid var(--border);border-radius:20px;padding:4px 12px;pointer-events:none}
</style>
</head>
<body>

<canvas id="bgc"></canvas>
<div id="vig"></div>

<div id="hdr">
  <div class="hlogo">
    <div class="hring">∑</div>
    <div><div class="htxt">Math 101</div><div class="hsub">King Saud University</div></div>
  </div>
  <div class="hacts">
    <button class="hab" onclick="resetV()">↺ إعادة ضبط</button>
    <button class="hab" onclick="exportS()">⬇ SVG</button>
  </div>
</div>

<div id="leg">
  <div class="lt">Chapters</div>
  <div class="li" onclick="focusCh(0)"><div class="ld" style="background:var(--c1)"></div><span class="ll">Chapter 1 — Numbers & Functions</span></div>
  <div class="li" onclick="focusCh(1)"><div class="ld" style="background:var(--c2)"></div><span class="ll">Chapter 2 — Limits & Continuity</span></div>
</div>

<div id="cw"><svg id="svg"></svg></div>

<div id="zf">
  <button class="zb" onclick="bz(1.15)">＋</button>
  <button class="zb" onclick="bz(.87)">－</button>
</div>

<p id="hint">Drag • Scroll to zoom • Click node for details</p>

<div id="dp">
  <div id="dp-l"></div>
  <button id="dp-x" onclick="closeDp()">✕</button>
  <div id="dp-layout">
    <div id="dp-right"><div id="dp-diagram"></div></div>
    <div id="dp-left">
      <div id="dp-meta"></div>
      <div id="dp-t"></div>
      <p id="dp-d"></p>
      <ul id="dp-pts"></ul>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
const DATA = [
  {

    tags:['Section 1.1 – 1.4'],
    bgSyms:['ℝ','ℕ','ℤ','ℚ','f(x)','f⁻¹','∘','sin','cos','|x|','π','θ'],
    sections:[
      { label:'1.1\nSets of Numbers &\nInequalities',
        desc:'Number sets, inequality intervals, and properties of absolute value.',
        tags:['Number Sets','Intervals','Absolute Value'],
        leaves:[
          { label:'Number\nSets',
            desc:'Number sets form a chain: ℕ⊂W⊂ℤ⊂ℚ⊂ℝ — each set contains the previous one.',

              {label:'ℤ Integers',            desc:'Whole numbers and their negatives.',             tags:['ℤ = {…,−2,−1,0,1,2,…}','W ⊂ ℤ','Example: −5° temperature']},
              {label:'ℚ Rational\nNumbers',   desc:'Written as p/q where p,q are integers and q≠0. Includes terminating and repeating decimals.',              tags:['ℚ = {p/q | q≠0}','ℤ ⊂ ℚ','Example: 3/4, −2/3']},
              {label:'ℝ Real\nNumbers',       desc:'Includes rational and irrational numbers. Every point on the number line.',            tags:['ℚ ⊂ ℝ','Includes π, √2, e','Non-terminating, non-repeating']},
            ]
          },
          { label:'Intervals &\nInequalities',
            desc:'Representing inequality solutions as intervals, with the sign-flip rule.',

              {label:'Open\n(a, b)',       desc:'Does not include endpoints: a < x < b.',            tags:['(a,b): a < x < b','Open endpoints ○','Example: (1,5)']},
              {label:'Closed\n[a, b]',     desc:'Includes both endpoints: a ≤ x ≤ b.',              tags:['[a,b]: a ≤ x ≤ b','Closed endpoints ●','Example: [−2,3]']},
              {label:'Half-Open\n[a,b)',    desc:'Includes exactly one endpoint.',               tags:['[a,b): a ≤ x < b','(a,b]: a < x ≤ b']},
              {label:'Infinite\nIntervals', desc:'Intervals that extend to infinity in one or both directions.',           tags:['(a,∞): x > a','(−∞,b]: x ≤ b','(−∞,∞) = ℝ']},
              {label:'Sign\nRule',          desc:'Multiplying or dividing by a negative flips the inequality sign.', tags:['−2x > 4 ⟹ x < −2','Multiply by −1 → flip sign','Example: −x ≤ 3 ⟹ x ≥ −3']},

          },
          { label:'Absolute\nValue',

              {label:'Triangle\nInequality',   desc:'|a+b| ≤ |a|+|b| — always true for any real numbers.',              tags:['|a+b| ≤ |a|+|b|','مثال: |3+(−5)| ≤ 3+5','2 ≤ 8 ✓']},
              {label:'Solving\n|x−a| < r',    desc:'Means a−r < x < a+r — an open interval around a.',    tags:['|x−2|<3 ⟹ −1<x<5','تمثيل على خط الأعداد','Distance less than r']},
              {label:'Solving\n|x−a| > r',    desc:'Means x<a−r or x>a+r — union of two intervals.', tags:['|x|>2 ⟹ x<−2 أو x>2','Two directions on number line']},
            ]
          },
        ]
      },
      { label:'1.2\nFunctions',
        desc:'Function definition, types, operations including composition.',
        tags:['Definition','Types','Operations','Composition'],
        leaves:[
          { label:'Function\nDefinition',
            desc:'A relation that maps each element in the domain to exactly one element in the range.',
            tags:['Domain','Range','VLT'],
            children:[
              {label:'Domain', desc:'The set of all valid inputs for the function.', tags:['مثال: f(x)=√x ⟹ Domain=[0,∞)','Exclude values making function undefined']},

              {label:'Power\nf(x)=xⁿ',      desc:'Behavior depends on n. Even n: symmetric about y-axis. Odd n: symmetric about origin.',            tags:['Even n: f(x)=x²','Odd n: f(x)=x³','Even n: symmetric about y-axis']},
              {label:'Root\nf(x)=ⁿ√x',      desc:'Square root domain [0,∞). nth root domain depends on n.',         tags:['f(x)=√x: [0,∞)','f(x)=∛x: ℝ','Radicand must be ≥ 0']},
              {label:'Rational\nf=p(x)/q(x)', desc:'Domain: all ℝ except where denominator = 0.', tags:['q(x)≠0','Example: 1/(x−2)','مجالها: ℝ−{2}']},

        ]

          },
          { label:'Inverse\nFunction f⁻¹',
            desc:'If f is one-to-one, then f⁻¹ exists such that y=f(x) ⟺ x=f⁻¹(y).',
            tags:['Def 1.3.2'],
            children:[
              {label:'How to\nFind f⁻¹', desc:'(1) Write y=f(x). (2) Swap x and y. (3) Solve for y.', tags:['Example: f(x)=2x+1','y=2x+1 ⟹ x=2y+1','f⁻¹(x)=(x−1)/2']},
              {label:'Domain &\nRange',   desc:'Domain(f⁻¹)=Range(f). Range(f⁻¹)=Domain(f).', tags:['Domain(f⁻¹)=Range(f)','Range(f⁻¹)=Domain(f)','مثال: f(x)=√x ⟹ f⁻¹(x)=x²']},
              {label:'Graph\ny = x',      desc:'Graph of f⁻¹ is the reflection of graph of f across y=x.', tags:['(a,b) on f ⟹ (b,a) on f⁻¹','Example: (2,8) on x³ ⟹ (8,2) on ∛x']},

          },
          { label:'Cancellation\nLaws',

// BACKGROUND CANVAS — themed per chapter region
// ═══════════════════════════════════════════════════════
const bgCanvas=document.getElementById('bgc');
const bgCtx=bgCanvas.getContext('2d');

// ── AUTONOMOUS FLOATING SYMBOLS ───────────────────────────
const SYM_LIST=['π','∑','∫','∞','∂','Δ','∇','√','α','β','θ','λ','lim','sin','cos','f⁻¹','ℝ','|x|','dx','xⁿ','∀','∃','≤','≥','±','φ','μ','σ'];
const FLOATS=[];
function makeFloat(startY){
  return{
    sym: SYM_LIST[Math.floor(Math.random()*SYM_LIST.length)],
    x: Math.random()*window.innerWidth,
    y: startY!==undefined ? startY : Math.random()*window.innerHeight,
    size: Math.random()*58+12,
    speed: Math.random()*.28+.08,
    opacity: Math.random()*.038+.016,
    drift: (Math.random()-.5)*.18,
    rot: (Math.random()-.5)*.004,
    angle: (Math.random()-.5)*.4,
  };
}
for(let i=0;i<32;i++) FLOATS.push(makeFloat());

// Dot grid — draw once on a separate offscreen canvas for perf
let dotCanvas=null;
function buildDotGrid(){
  dotCanvas=document.createElement('canvas');
  dotCanvas.width=bgCanvas.width;
  dotCanvas.height=bgCanvas.height;
  const ctx=dotCanvas.getContext('2d');
  ctx.fillStyle='rgba(255,255,255,0.028)';
  for(let x=0;x<dotCanvas.width;x+=26)
    for(let y=0;y<dotCanvas.height;y+=26){
      ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();
    }
}

function drawBg(){
  const BW=bgCanvas.width, BH=bgCanvas.height;
  // Skip frame if canvas not ready
  if(!BW||!BH){requestAnimationFrame(drawBg);return;}
  bgCtx.clearRect(0,0,BW,BH);

  // Dot grid (pre-rendered)
  if(dotCanvas&&dotCanvas.width>0&&dotCanvas.height>0) bgCtx.drawImage(dotCanvas,0,0);

  // Floating symbols
  FLOATS.forEach(s=>{
    s.y+=s.speed;s.x+=s.drift;s.angle+=s.rot;
    if(s.y>BH+s.size*2) Object.assign(s,makeFloat(-s.size*2-Math.random()*80));
    bgCtx.save();
    bgCtx.translate(s.x,s.y);bgCtx.rotate(s.angle);
    bgCtx.font=`300 italic ${s.size}px "Cormorant Garamond",Georgia,serif`;
    bgCtx.fillStyle=`rgba(201,168,76,${s.opacity})`;
    bgCtx.fillText(s.sym,0,0);
    bgCtx.restore();
  });
  requestAnimationFrame(drawBg);
}

function setupBg(){
  bgCanvas.width=window.innerWidth;
  bgCanvas.height=window.innerHeight;
  buildDotGrid();
}
window.addEventListener('resize',setupBg);
setupBg();
drawBg();

// SVG ENGINE
// ═══════════════════════════════════════════════════════
const NS='http://www.w3.org/2000/svg';
let G=null;
const chCenters=[];

// Canvas world — very large so nothing overlaps
const W=10000, H=10000, CX=W/2, CY=H/2;

// Radial distances
const D_CH   = 240;
const D_SEC  = 530;
const D_LEAF = 980;
const D_SUB  = 1880;

const GAP_PX = 22;

const ROOT_R=64, CH_R=48, SEC_R=34;
const LW=124, LH=48;
const SW=104, SH=36;

// Animation lists
let animLines=[];
let _animNodeList=[];

function se(tag,a,p){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a||{}))e.setAttribute(k,v);if(p)p.appendChild(e);return e}
function polar(cx,cy,deg,r){const a=deg*Math.PI/180;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}}

// Convert pixel width to degrees at a given radius
function px2deg(px,r){return (px/r)*(180/Math.PI)}

// Angular span needed for one sub-leaf at D_SUB
function subSpanDeg(){return px2deg(SW+GAP_PX, D_SUB)}
// Angular span needed for one topic (= max of its own size vs its children's total)
function topicSpanDeg(topic){
  const subs=topic.children||[];
  const fromSubs=subs.length * subSpanDeg();
  const fromSelf=px2deg(LW+GAP_PX, D_LEAF);
  return Math.max(fromSubs, fromSelf);
}
// Angular span needed for one section
function secSpanDeg(sec){
  const topics=sec.leaves||[];
  return topics.reduce((s,t)=>s+topicSpanDeg(t),0);
}

function buildMap(){
  const svg=document.getElementById('svg');
  svg.innerHTML=''; chCenters.length=0;
  animLines=[]; _animNodeList=[];
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  G=se('g',{},svg);
  const LG=se('g',{},G), NG=se('g',{},G);

  // BG symbols
  DATA.forEach((ch,ci)=>{
    const base=ci===0?180:0;
    (ch.bgSyms||[]).forEach(sym=>{
      const a=base-80+Math.random()*160, d=500+Math.random()*1500;
      const p=polar(CX,CY,a,d);
      se('text',{x:p.x,y:p.y,'text-anchor':'middle','dominant-baseline':'central',
        fill:ch.color,opacity:(0.022+Math.random()*0.03).toFixed(3),
        'font-size':(35+Math.random()*80).toFixed(0),
        'font-family':'Cormorant Garamond,serif','font-style':'italic','font-weight':'300',
        transform:`rotate(${(Math.random()*24-12).toFixed(1)},${p.x},${p.y})`},LG).textContent=sym;
    });
  });

  // ROOT
  drawRoot(NG,LG,CX,CY);

  // Both chapters animate together — same delay bucket
  const chSectors=[
    {center:180, span:183},
    {center:0,   span:183},
  ];

  DATA.forEach((ch,ci)=>{
    const sector=chSectors[ci];
    let delay=200;  // both start at same time

    const chPos=polar(CX,CY,sector.center,D_CH);
    chCenters[ci]={x:chPos.x,y:chPos.y};
    animLine(LG,CX,CY,chPos.x,chPos.y,ch.color,2.5,delay);
    drawChNode(NG,chPos.x,chPos.y,ch,delay+60);
    delay+=140;

    // Compute total section span and center in sector
    const secs=ch.sections;
    const spans=secs.map(s=>Math.max(secSpanDeg(s), px2deg(SEC_R*2+GAP_PX, D_SEC)));
    const totalSpan=spans.reduce((s,a)=>s+a,0);
    let curAngle=sector.center - totalSpan/2;

    secs.forEach((sec,si)=>{
      const span=spans[si];
      const secCenter=curAngle+span/2;
      curAngle+=span;

      const secPos=polar(CX,CY,secCenter,D_SEC);
      animLine(LG,chPos.x,chPos.y,secPos.x,secPos.y,ch.color,1.6,delay);
      drawSecNode(NG,secPos.x,secPos.y,ch.color,sec,delay+50);
      delay+=110;

      // Topics
      const topics=sec.leaves||[];
      const tSpans=topics.map(t=>topicSpanDeg(t));
      const totalTSpan=tSpans.reduce((s,a)=>s+a,0);
      let tAngle=secCenter-totalTSpan/2;

      topics.forEach((topic,ti)=>{
        const tSpan=tSpans[ti];
        const topicCenter=tAngle+tSpan/2;
        tAngle+=tSpan;

        const topicPos=polar(CX,CY,topicCenter,D_LEAF);
        animLine(LG,secPos.x,secPos.y,topicPos.x,topicPos.y,ch.color,1.2,delay);
        drawLeaf(NG,topicPos.x,topicPos.y,ch.color,topic,delay+40);
        delay+=90;

        // Sub-leaves — evenly spaced
        const subs=topic.children||[];
        if(subs.length){
          const sDeg=subSpanDeg();
          const totalS=subs.length*sDeg;
          let sAngle=topicCenter-totalS/2+sDeg/2;

          subs.forEach((sub)=>{
            const subPos=polar(CX,CY,sAngle,D_SUB);
            animLine(LG,topicPos.x,topicPos.y,subPos.x,subPos.y,ch.color,0.8,delay,true);
            drawSubLeaf(NG,subPos.x,subPos.y,ch.color,sub,delay+30);
            sAngle+=sDeg;
            delay+=60;
          });
        }
      });
    });
  });

  setTimeout(runEntranceAnimation,100);
}

// ── Animated line ──────────────────────────────────────
function animLine(p,x1,y1,x2,y2,col,w,delay,dashed=false){
  const len=Math.hypot(x2-x1,y2-y1);
  const g=se('path',{d:`M${x1},${y1}L${x2},${y2}`,fill:'none',stroke:col,
    'stroke-width':w*2.5,opacity:'0','stroke-linecap':'round'},p);
  const e=se('path',{d:`M${x1},${y1}L${x2},${y2}`,fill:'none',stroke:col,
    'stroke-width':w,opacity:'0','stroke-linecap':'round',
    'stroke-dasharray':len,'stroke-dashoffset':len},p);
  if(dashed){g.setAttribute('stroke-dasharray','7 7');e.setAttribute('stroke-dasharray','7 7');}
  animLines.push({glow:g,line:e,len,delay,dashed});
}

function runEntranceAnimation(){
  animLines.forEach(({glow,line,len,delay,dashed})=>{
    setTimeout(()=>{
      glow.style.transition='opacity 0.3s';
      glow.setAttribute('opacity',dashed?'.04':'.07');
      line.style.transition=`stroke-dashoffset 0.55s cubic-bezier(0.4,0,0.2,1),opacity 0.3s`;
      line.setAttribute('opacity',dashed?'.22':'.38');
      line.setAttribute('stroke-dashoffset','0');
    },delay);
  });
  _animNodeList.forEach(({g,delay})=>{
    setTimeout(()=>{
      g.style.transition='opacity 0.4s ease,transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
      g.style.opacity='1';
      g.style.transform='scale(1)';
    },delay);
  });
}


function animatedNode(g,delay){
  g.style.opacity='0';
  g.style.transform='scale(0.5)';
  g.style.transformBox='fill-box';
  g.style.transformOrigin='center';
  _animNodeList.push({g,delay});
}


function drawRoot(NG,LG,x,y){
  const g=se('g',{class:'ng'},NG);
  [ROOT_R+22,ROOT_R+12,ROOT_R+4].forEach((r,i)=>
    se('circle',{cx:x,cy:y,r,fill:'none',stroke:'#c9a84c','stroke-width':'1',opacity:['.04','.08','.14'][i]},g));
  se('circle',{cx:x,cy:y,r:ROOT_R,fill:'#06070b',stroke:'#c9a84c','stroke-width':'2'},g);
  se('circle',{cx:x,cy:y,r:ROOT_R-4,fill:'#c9a84c',opacity:'.06'},g);
  se('ellipse',{cx:x-ROOT_R*.17,cy:y-ROOT_R*.23,rx:ROOT_R*.33,ry:ROOT_R*.15,fill:'rgba(255,255,255,.05)'},g);
  ['Math','101'].forEach((ln,i)=>se('text',{x,y:y-10+i*20,'text-anchor':'middle','dominant-baseline':'central',fill:'#c9a84c','font-size':'15','font-weight':'700','font-family':'IBM Plex Sans Arabic,sans-serif'},g).textContent=ln);
  g.addEventListener('click',()=>openDp('Math 101','Interactive mind map for Calculus — King Saud University.',['Chapter 1: Numbers & Functions','Chapter 2: Limits & Continuity'],'#c9a84c','Math 101 — KSU'));
  g.addEventListener('mouseenter',()=>g.setAttribute('transform','translate(0,-5)'));
  g.addEventListener('mouseleave',()=>g.removeAttribute('transform'));
  animatedNode(g,0);
}

function drawChNode(NG,x,y,ch,delay){
  const g=se('g',{class:'ng'},NG);
  se('circle',{cx:x,cy:y,r:CH_R+9,fill:'none',stroke:ch.color,'stroke-width':'1',opacity:'.1'},g);
  const fill=se('circle',{cx:x,cy:y,r:CH_R,fill:ch.color,opacity:'.12'},g);
  se('circle',{cx:x,cy:y,r:CH_R,fill:'none',stroke:ch.color,'stroke-width':'2'},g);
  se('ellipse',{cx:x-CH_R*.16,cy:y-CH_R*.22,rx:CH_R*.3,ry:CH_R*.14,fill:'rgba(255,255,255,.06)'},g);
  const lines=ch.label.split('\n');
  lines.forEach((ln,i)=>se('text',{x,y:y+(i-(lines.length-1)/2)*17+(lines.length>1?2:0),'text-anchor':'middle','dominant-baseline':'central',fill:'#eeeaf2','font-size':'11.5','font-weight':'700','font-family':'IBM Plex Sans Arabic,sans-serif'},g).textContent=ln);
  g.addEventListener('click',e=>{e.stopPropagation();openDp(ch.label,ch.desc,ch.tags,ch.color,`Chapter ${ch.id}`)});
  g.addEventListener('mouseenter',()=>{g.setAttribute('transform','translate(0,-6)');fill.setAttribute('opacity','.22')});
  g.addEventListener('mouseleave',()=>{g.removeAttribute('transform');fill.setAttribute('opacity','.12')});
  animatedNode(g,delay);
}

function drawSecNode(NG,x,y,col,sec,delay){
  const g=se('g',{class:'ng'},NG);
  const fill=se('circle',{cx:x,cy:y,r:SEC_R,fill:col,opacity:'.14'},g);
  se('circle',{cx:x,cy:y,r:SEC_R,fill:'none',stroke:col,'stroke-width':'1.5'},g);
  const lines=sec.label.split('\n');

  g.addEventListener('click',e=>{e.stopPropagation();openDp(sec.label,sec.desc,sec.tags,col,'Section')});
  g.addEventListener('mouseenter',()=>{g.setAttribute('transform','translate(0,-5)');fill.setAttribute('opacity','.25')});
  g.addEventListener('mouseleave',()=>{g.removeAttribute('transform');fill.setAttribute('opacity','.14')});
  animatedNode(g,delay);
}

function drawLeaf(NG,x,y,col,node,delay){
  const g=se('g',{class:'ng'},NG);
  se('rect',{x:x-LW/2+2,y:y-LH/2+2,width:LW,height:LH,rx:'11',fill:'rgba(0,0,0,.5)'},g);
  const rect=se('rect',{x:x-LW/2,y:y-LH/2,width:LW,height:LH,rx:'11',fill:'#090a10',stroke:col,'stroke-width':'1.5'},g);
  se('rect',{x:x-LW/2+1,y:y-LH/2+1,width:LW-2,height:6,rx:'9',fill:col,opacity:'.6'},g);
  se('rect',{x:x-LW/2+4,y:y-LH/2+10,width:LW-8,height:LH-18,rx:'7',fill:col,opacity:'.04'},g);
  const lines=node.label.split('\n');
  lines.forEach((ln,i)=>se('text',{x,y:y+(i-(lines.length-1)/2)*15+(lines.length>1?2:0),'text-anchor':'middle','dominant-baseline':'central',fill:'#eeeaf2','font-size':'10.5','font-weight':'600','font-family':'IBM Plex Sans Arabic,sans-serif'},g).textContent=ln);
  g.addEventListener('click',e=>{e.stopPropagation();openDp(node.label,node.desc,node.tags||[],col,'Topic')});
  g.addEventListener('mouseenter',()=>{g.setAttribute('transform','translate(0,-5)');rect.setAttribute('stroke-width','2.3')});
  g.addEventListener('mouseleave',()=>{g.removeAttribute('transform');rect.setAttribute('stroke-width','1.5')});
  animatedNode(g,delay);
}

// Sub-leaf pill
function drawSubLeaf(NG,x,y,col,node,delay){
  const g=se('g',{class:'ng'},NG);
  se('rect',{x:x-SW/2+1,y:y-SH/2+1,width:SW,height:SH,rx:'9',fill:'rgba(0,0,0,.4)'},g);
  const rect=se('rect',{x:x-SW/2,y:y-SH/2,width:SW,height:SH,rx:'9',fill:'#0d0e16',stroke:col,'stroke-width':'1',opacity:'.85'},g);
  se('rect',{x:x-SW/2+1,y:y-SH/2+1,width:SW-2,height:4,rx:'7',fill:col,opacity:'.5'},g);
  const lines=node.label.split('\n');
  lines.forEach((ln,i)=>se('text',{x,y:y+(i-(lines.length-1)/2)*13+(lines.length>1?1:0),'text-anchor':'middle','dominant-baseline':'central',fill:'rgba(238,234,242,.8)','font-size':'9','font-weight':'500','font-family':'IBM Plex Sans Arabic,sans-serif'},g).textContent=ln);

let sc=1,tx=0,ty=0,dragging=false,dsx=0,dsy=0;
const cw=document.getElementById('cw');

function applyT(){if(G)G.setAttribute('transform',`translate(${tx},${ty}) scale(${sc})`)}

function zoomAt(mx,my,f){
  const ns=Math.max(.07,Math.min(5,sc*f));
  tx=mx-(mx-tx)*(ns/sc); ty=my-(my-ty)*(ns/sc);
  sc=ns; applyT();
}
function bz(f){zoomAt(cw.clientWidth/2,cw.clientHeight/2,f)}

function resetV(){
  const vw=window.innerWidth;
  const vh=window.innerHeight-48;
  const viewR=(D_LEAF+LH+150)*2;
  sc=Math.min(vw,vh)/viewR*1.1;
  tx=vw/2 - CX*sc;
  ty=vh/2 - CY*sc;
  applyT();
}

function focusCh(i){
  if(!chCenters[i])return;
  const{x,y}=chCenters[i];
  sc=.32;
  tx=cw.clientWidth/2-x*sc;
  ty=cw.clientHeight/2-y*sc;
  applyT();
}

cw.addEventListener('mousedown',e=>{if(e.target.closest('.ng'))return;dragging=true;dsx=e.clientX-tx;dsy=e.clientY-ty;cw.style.cursor='grabbing'});
window.addEventListener('mousemove',e=>{if(!dragging)return;tx=e.clientX-dsx;ty=e.clientY-dsy;applyT()});
window.addEventListener('mouseup',()=>{dragging=false;cw.style.cursor=''});
cw.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cw.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.1:.91);
},{passive:false});

let ltd=null;
cw.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;dsx=e.touches[0].clientX-tx;dsy=e.touches[0].clientY-ty}if(e.touches.length===2)ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)},{passive:true});
cw.addEventListener('touchmove',e=>{if(e.touches.length===1&&dragging){tx=e.touches[0].clientX-dsx;ty=e.touches[0].clientY-dsy;applyT()}if(e.touches.length===2&&ltd){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-cw.getBoundingClientRect().left;const my=(e.touches[0].clientY+e.touches[1].clientY)/2-cw.getBoundingClientRect().top;zoomAt(mx,my,d/ltd);ltd=d}},{passive:true});
cw.addEventListener('touchend',()=>{dragging=false;ltd=null});

<text x="260" y="293" text-anchor="middle" font-size="10" font-family="monospace" fill="#c9a84c">Definitions (Right Triangle)</text>

<!-- 6 fractions — 3 per row -->
${[
  ['sin','opp','hyp','#1fad84', 55],
  ['cos','adj','hyp','#7b6fd4',195],
  ['tan','opp','adj','#c9854c',335],
  ['csc','hyp','opp','#1fad84', 55],
  ['sec','hyp','adj','#7b6fd4',195],
  ['cot','adj','opp','#c9854c',335],

}).join('')}
</svg>`,

// DETAIL PANEL

function openDp(title,desc,tags,col,meta){
  document.getElementById('dp-l').style.background=col;
  document.documentElement.style.setProperty('--dp-col',col);
  document.getElementById('dp-meta').textContent=meta||'';
  document.getElementById('dp-t').textContent=title.replace(/\n/g,' ');
  document.getElementById('dp-d').textContent=desc;
  const ul=document.getElementById('dp-pts');
  ul.innerHTML='';
  (tags||[]).forEach(t=>{
    const li=document.createElement('li');
    li.textContent=t;
    ul.appendChild(li);
  });
  // Diagram
  const diag=document.getElementById('dp-diagram');
  const key=Object.keys(DIAGRAMS).find(k=>k===title);
  if(key){
    diag.innerHTML=DIAGRAMS[key]();
    document.getElementById('dp-right').style.display='flex';
  } else {
    diag.innerHTML=`<div id="dp-no-diagram">لا توجد رسمة<br>لهذا المفهوم</div>`;
    document.getElementById('dp-right').style.display='flex';
  }
  document.getElementById('dp').classList.add('open');
}
function closeDp(){document.getElementById('dp').classList.remove('open')}
cw.addEventListener('click',e=>{if(!e.target.closest('.ng'))closeDp()});

function exportS(){
  const s=document.getElementById('svg');
  const b=new Blob([new XMLSerializer().serializeToString(s)],{type:'image/svg+xml'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='math101.svg';a.click();
}
